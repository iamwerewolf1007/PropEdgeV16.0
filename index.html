        </div>
        <div class="g5">
          <div class="kv"><div class="kv-l">Avg Pts</div><div class="kv-v" style="color:var(--vi);font-size:12px">${p.h2h!=null?p.h2h.toFixed(1):'—'}</div></div>
          <div class="kv"><div class="kv-l">Games</div><div class="kv-v" style="font-size:12px">${p.h2hG||'—'}</div></div>
          <div class="kv"><div class="kv-l">TS% Dev</div><div class="kv-v" style="font-size:12px">${p.h2hTsDev!=null?(p.h2hTsDev>0?'+':'')+p.h2hTsDev.toFixed(1):'—'}</div></div>
          <div class="kv"><div class="kv-l">FGA Dev</div><div class="kv-v" style="font-size:12px">${p.h2hFgaDev!=null?(p.h2hFgaDev>0?'+':'')+p.h2hFgaDev.toFixed(1):'—'}</div></div>
          <div class="kv"><div class="kv-l">H2H Conf</div><div class="kv-v" style="color:${(p.h2hConfidence||0)>=.7?'var(--gr)':(p.h2hConfidence||0)>=.5?'var(--yl)':'var(--tx3)'};font-size:12px">${p.h2hConfidence!=null?Math.round(p.h2hConfidence*100)+'%':'—'}</div></div>
        </div>
        <div style="font:400 8px var(--S);color:var(--tx3);margin-top:4px">H2H Prop: <strong style="color:var(--gr)">${_h2hPropHR}</strong> &middot; H2H Min: <strong style="color:var(--gr)">${_h2hMinHR}</strong> &middot; Trend: <span style="color:${_h2hTrendC}">${_h2hTrend}</span></div>
      </div>`;
    }

    // LINE HISTORY
    if(p.lineHistory&&p.lineHistory.length>0){
      h+=`<div class="sec">Line History</div><div class="line-hist">`;
      p.lineHistory.forEach((lh,i)=>{
        const prevLine=i>0?p.lineHistory[i-1].line:null;
        const moved=prevLine!=null&&lh.line!==prevLine;
        if(i>0)h+=`<div class="lh-arrow">${moved?'<span style="color:var(--yl)">→</span>':'→'}</div>`;
        h+=`<div class="lh-node"><div class="lh-batch">B${lh.batch||i+1}</div><div class="lh-val ${moved?'lh-moved':''}">${lh.line}</div><div class="lh-time">${lh.ts||''}</div></div>`;
      });
      h+=`</div>`;
    }

    // SIGNAL FLAGS
    const isGradedPlay=p.result==='WIN'||p.result==='LOSS';
    const preTotal=p.flagDetails?p.flagDetails.length:0;
    const preCount=p.flagDetails?p.flagDetails.filter(f=>f.agrees).length:0;
    const postCount=isGradedPlay&&p.flagDetails?p.flagDetails.filter(f=>(f.agrees&&p.result==='WIN')||(!f.agrees&&p.result==='LOSS')).length:null;
    const postC=postCount!==null?(postCount/preTotal>=.7?'var(--gr)':postCount/preTotal>=.5?'var(--yl)':'var(--rd)'):'';
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin:8px 0 5px">
      <span style="font:800 9px var(--M);color:var(--tx2);letter-spacing:1px">SIGNAL FLAGS</span>
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font:700 10px var(--M);color:var(--tx2)">${preCount}/${preTotal} <span style="font:400 7px var(--M);color:var(--bl);font-weight:800;letter-spacing:.5px">PRE</span></span>
        ${postCount!==null?`<span style="font:400 8px var(--M);color:var(--tx4)">·</span><span style="font:700 10px var(--M);color:${postC}">${postCount}/${preTotal} <span style="font:400 7px var(--M);font-weight:800;letter-spacing:.5px">POST</span></span>`:''}
      </div>
    </div><div class="flag-grid">`;
    if(p.flagDetails)p.flagDetails.forEach(f=>{
      const preOk=f.agrees;
      const postCorrect=isGradedPlay?((f.agrees&&p.result==='WIN')||(!f.agrees&&p.result==='LOSS')):null;
      const outcomeMark=postCorrect===null?'':(postCorrect?'<span style="font:800 10px var(--M);color:var(--gr);margin-left:5px">✓</span>':'<span style="font:800 10px var(--M);color:var(--rd);margin-left:5px">✗</span>');
      h+=`<div class="flag ${preOk?'fy':'fn'}" style="display:flex;align-items:center;justify-content:space-between">${f.name}<span style="opacity:.45;margin-left:4px;font-size:7px">${f.detail||''}</span>${outcomeMark}</div>`;
    });
    h+=`</div>`;

    // RAW SIGNAL VALUES
    h+=`<div class="sec">Raw Signal Values</div><div class="ctx">`;
    if(p.volume!=null)h+=`<span>Vol: ${p.volume>0?'+':''}${p.volume}</span>`;
    if(p.trend!=null) h+=`<span>Trend: ${p.trend>0?'+':''}${p.trend}</span>`;
    if(p.momentum!=null)h+=`<span>Mom: ${p.momentum>0?'+':''}${p.momentum.toFixed(1)}</span>`;
    if(p.fgTrend!=null)h+=`<span>FG↗: ${p.fgTrend>0?'+':''}${p.fgTrend}%</span>`;
    if(p.minTrend!=null)h+=`<span>Min↗: ${p.minTrend>0?'+':''}${p.minTrend}</span>`;
    if(p.std10)h+=`<span>σ: ${p.std10}</span>`;
    h+=`</div>`;

    // SCORING AVERAGES — L3 L5 L10 L20 L30 (L20 approximated)
    h+=`<div class="sec">Scoring Averages</div><div class="g5">
      ${['L3','L5','L10','L20','L30'].map(k=>{
        const v=p[k.toLowerCase()];
        return`<div class="kv"><div class="kv-l">${k}</div><div class="kv-v" style="color:${clr(v,p.line)};font-size:13px">${v??'—'}</div></div>`;
      }).join('')}
    </div>`;

    // MATCHUP CONTEXT — V12 format with position-specific DEF label
    const posShort=((p.posSimple||'POS').split('-')[0].slice(0,3).toUpperCase());
    h+=`<div class="sec">Matchup Context</div><div class="g4">${[
      ['DEF '+posShort,'#'+(p.defP||'—'),p.defP&&p.defP<=10?'var(--rd)':p.defP&&p.defP>=20?'var(--gr)':'var(--tx)'],
      ['PACE','#'+(p.pace||'—'),'var(--tx)'],
      ['HR L10',p.hr10Pct!=null?p.hr10Pct+'%':'—',hrc(p.hr10Pct||0)],
      ['HR L30',p.hr30Pct!=null?p.hr30Pct+'%':'—',hrc(p.hr30Pct||0)]
    ].map(([k,v,c])=>`<div class="kv"><div class="kv-l">${k}</div><div class="kv-v" style="color:${c};font-size:12px">${v}</div></div>`).join('')}</div>`;

    // SHOOTING & VOLUME — use fields that actually exist in V14 JSON
    h+=`<div class="sec">Shooting &amp; Volume</div><div class="g4">${[
      ['FGA L10', p.fga10!=null?p.fga10.toFixed(1):'—'],
      ['3PA L10', p.fg3a_l10!=null?p.fg3a_l10.toFixed(1):'—'],
      ['FTA L10', p.fta_l10!=null?p.fta_l10.toFixed(1):'—'],
      ['FT Rate', p.ft_rate!=null?(p.ft_rate*100).toFixed(0)+'%':'—']
    ].map(([k,v])=>`<div class="kv"><div class="kv-l">${k}</div><div class="kv-v" style="color:var(--tx);font-size:12px">${v}</div></div>`).join('')}</div>`;
    h+=`<div class="g4">${[
      ['MIN L10', p.minL10!=null?p.minL10.toFixed(0):'—'],
      ['MIN L30', p.minL30!=null?p.minL30.toFixed(0):'—'],
      ['Usage L10', p.usage_l10!=null?(p.usage_l10*100).toFixed(0)+'%':'—'],
      ['Pts/Min', p.pts_per_min!=null?p.pts_per_min.toFixed(2):'—']
    ].map(([k,v])=>`<div class="kv"><div class="kv-l">${k}</div><div class="kv-v" style="color:var(--tx);font-size:12px">${v}</div></div>`).join('')}</div>`;
    h+=`<div class="g4">${[
      ['Rest', p.rest_days!=null?p.rest_days+'d':'—'],
      ['B2B', p.is_b2b?'Yes':'No'],
      ['Home avg', p.homeAvgPts!=null?p.homeAvgPts.toFixed(1):'—'],
      ['Away avg', p.awayAvgPts!=null?p.awayAvgPts.toFixed(1):'—']
    ].map(([k,v])=>`<div class="kv"><div class="kv-l">${k}</div><div class="kv-v" style="color:var(--tx);font-size:12px">${v}</div></div>`).join('')}</div>`;

    h+='<div class="sec">Trends</div>';
    h+='<div style="background:var(--bg);border-radius:7px;padding:5px 8px;margin-bottom:5px;border:1px solid var(--bg2)">';
    const _trows=[
      {lbl:'FG3A',  win:'L5 vs L20', v:p.fg3a_l10,  ref:null,        fmt:v=>v.toFixed(1)+' att', up:null, dn:null},
      {lbl:'FTA',   win:'L5 vs L10', v:p.fta_l10,   ref:null,        fmt:v=>v.toFixed(1)+' att', up:v=>v>5, dn:v=>v<3},
      {lbl:'FT rate',win:'L5 vs L10',v:p.ft_rate,   ref:null,        fmt:v=>(v*100).toFixed(0)+'%', up:v=>v>0.35, dn:v=>v<0.2},
      {lbl:'Usage', win:'L5 vs L10', v:p.usage_l10, ref:p.usage_l30, fmt:v=>v.toFixed(1),         up:v=>p.usage_l30!=null&&v>p.usage_l30, dn:v=>p.usage_l30!=null&&v<p.usage_l30},
      {lbl:'EWM pts',win:'EWM vs L10',v:p.level_ewm, ref:p.l10,      fmt:v=>v.toFixed(1),         up:v=>p.l10!=null&&v>p.l10, dn:v=>p.l10!=null&&v<p.l10},
    ];
    _trows.forEach(function(t){
      if(t.v==null)return;
      const _isUp=t.up?t.up(t.v):false,_isDn=t.dn?t.dn(t.v):false;
      const _tc=_isUp?'var(--gr)':_isDn?'var(--rd)':'var(--bl)';
      const _arr=_isUp?'▲':_isDn?'▼':'→';
      const _refStr=t.ref!=null?' <span style="color:var(--tx4)">vs '+t.ref.toFixed(1)+'</span>':'';
      // Fix 7: use grid for consistent 3-column alignment
      h+='<div style="display:grid;grid-template-columns:70px 1fr auto;align-items:center;padding:4px 6px;border-radius:5px;margin-bottom:2px;background:'+_tc+'0d">';
      h+='<span style="color:var(--tx2);font:500 9px var(--S)">'+t.lbl+'</span>';
      h+='<span style="color:var(--tx4);font:400 7px var(--M);text-align:center">'+t.win+'</span>';
      h+='<span style="color:'+_tc+';font:700 9px var(--M);text-align:right">'+_arr+' '+t.fmt(t.v)+_refStr+'</span>';
      h+='</div>';
    });
    h+='</div>';

    // GAME CONTEXT — B2B and special flags only
    h+=`<div class="ctx">`;
    if(p.is_b2b)h+=`<span style="color:var(--yl)">⚡ Back-to-back</span>`;
    if(p.earlySeasonW!=null&&p.earlySeasonW<0.6)h+=`<span style="color:var(--yl)">⚠ Early season (${(p.earlySeasonW*100).toFixed(0)}% weight)</span>`;
    if(p.meanReversionRisk>=1)h+=`<span style="color:var(--rd)">↩ Reversion risk</span>`;
    h+=`</div>`;

    // BETTING LINES
    h+=`<div class="sec">Betting Lines</div><div class="ctx">`;
    h+=`<span>O: ${p.overOdds??'—'}</span><span>U: ${p.underOdds??'—'}</span><span>${p.books||0} books</span>`;
    if(p.lineSharpness!=null)h+=`<span>Sharp: ${(p.lineSharpness*100).toFixed(0)}%</span>`;
    h+=`</div>`;

    // POST-MATCH RESULT ANALYSIS
    const postReason=p.postMatchReason||p.reason;
    if(postReason&&p.result&&p.result!=='LEAN'){
      const resC=p.result==='WIN'?'var(--gr)':'var(--rd)';
      h+=`<div class="rsn" style="border-left:2px solid ${resC}"><strong style="color:${resC};font-size:9px">🎯 RESULT ANALYSIS</strong><br>${postReason}</div>`;
      if(p.lossType&&p.result==='LOSS'){
        h+=`<div style="margin-top:4px"><span style="font:700 8px var(--M);padding:2px 7px;border-radius:4px;background:rgba(239,68,68,.15);color:var(--rd);border:1px solid rgba(239,68,68,.3)">${p.lossType}</span></div>`;
      }
    }
    h+=`</div>`;
  }

  h+=`<div style="text-align:center;font:400 7px var(--S);color:var(--tx4);margin-top:3px">${o?'▲':'▼'}</div></div>`;
  return h;
}

// ─── SEASON TAB ───
function renderSeason(DS) {
  let h='';
  const months=[...new Set(DS.map(d=>d.date.slice(0,7)))].sort().reverse();
  months.forEach(m=>{
    const mDs=DS.filter(d=>d.date.startsWith(m));
    const mg=mDs.reduce((s,d)=>s+d.graded,0),mw=mDs.reduce((s,d)=>s+d.wins,0);
    const mApex=mDs.reduce((s,d)=>s+(d.apex||0),0),mApexW=mDs.reduce((s,d)=>s+(d.apexW||0),0);
    const mUltra=mDs.reduce((s,d)=>s+(d.ultra||0),0),mUltraW=mDs.reduce((s,d)=>s+(d.ultraW||0),0);
    const mElite=mDs.reduce((s,d)=>s+(d.elite||0),0),mEliteW=mDs.reduce((s,d)=>s+(d.eliteW||0),0);
    const mStrong=mDs.reduce((s,d)=>s+(d.strong||0),0),mStrongW=mDs.reduce((s,d)=>s+(d.strongW||0),0);
    const mPlay=mDs.reduce((s,d)=>s+(d.play||0),0),mPlayW=mDs.reduce((s,d)=>s+(d.playW||0),0);
    const mhr=mg?(mw/mg*100).toFixed(1):'—';
    const[y,mo]=m.split('-');
    const mLbl=new Date(+y,+mo-1,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
    const hrC=mg&&mw/mg>=.55?'var(--gr)':mg&&mw/mg<.5?'var(--rd)':'var(--yl)';
    const _hr=(w,t)=>t?(w/t*100).toFixed(1)+'%':'—';
    h+=`<div class="mcrd">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font:700 13px var(--M)">${mLbl}</span>
        <span style="font:700 14px var(--M);color:${hrC}">${mhr}%</span>
      </div>
      <div style="font:400 9px var(--S);color:var(--tx3);margin-bottom:6px">${mg} graded · ${mw}W/${mg-mw}L</div>
      <div class="g5">${[
        ['APEX',mApex,mApexW,'#34d399'],
        ['ULTRA',mUltra,mUltraW,'var(--yl)'],
        ['ELITE',mElite,mEliteW,'var(--vi)'],
        ['STRONG',mStrong,mStrongW,'var(--bl)'],
        ['PLAY+',mPlay,mPlayW,'#2dd4bf'],
      ].map(([lbl,tot,w,c])=>`<div class="kv">
        <div class="kv-l" style="color:${c}">${lbl}</div>
        <div class="kv-v" style="color:${c};font-size:11px">${_hr(w,tot)}</div>
        <div style="font:400 7px var(--M);color:var(--tx4);margin-top:1px">${w}W/${tot-w}L</div>
      </div>`).join('')}</div>
      <div style="font:600 7px var(--M);color:var(--tx4);letter-spacing:.8px;text-transform:uppercase;margin:8px 0 5px">Daily Heatmap — tap day to view</div>
      <div class="hmap">${mDs.map(d=>{
        const hr2=d.graded?d.wins/d.graded:-1;
        const bg=hr2<0?'var(--bg2)':hr2>=.65?'#15803d':hr2>=.55?'#166534':hr2>=.5?'#854d0e':hr2>=.45?'#991b1b':'#450a0a';
        const dIdx=_cache.dateIdx.get(d.date)??-1;
        return`<div class="hcel" style="background:${bg}" title="${d.date}: ${d.graded?d.wins+'W/'+(d.graded-d.wins)+'L':'No data'}" onclick="if(${dIdx}>=0){tab='daily';di=${dIdx};selMon='${m}';render()}"></div>`;
      }).join('')}</div>
    </div>`;
  });
  return h;
}

// ─── LEADERS TAB ───
function renderLeaders(_allLdrs) {
  let h='';
  const _lSearch=fSearch.trim().toLowerCase();
  const ldrs=_lSearch?_allLdrs.filter(l=>l.name.toLowerCase().includes(_lSearch)||(l.team||'').toLowerCase().includes(_lSearch)):_allLdrs.slice(0,100);
  h+=`<div style="font:600 7px var(--M);color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">${_lSearch?'Search results':'Top 100'} HR Leaders &middot; Min 5 Plays &middot; ${_allLdrs.length} total</div>`;
  h+=`<div style="margin-bottom:10px"><input type="search" placeholder="Search player or team..." value="${_lSearch}" oninput="fSearch=this.value;render()" style="width:100%;box-sizing:border-box;padding:7px 11px;border-radius:9px;border:1px solid var(--bg2);background:var(--bg1);color:var(--tx);font:400 12px var(--S);outline:none"/></div>`;
  // SPLIT LEADERBOARD: Prop HR | Min Line HR
  const _minLdrs = _cache.minLdrs; // pre-built in _buildCache
  const _propTop=_allLdrs.slice(0,10);
  if(_propTop.length||_minLdrs.length){
    h+=`<div class="lb-grid">
      <div class="lb-col">
        <div class="lb-hdr" style="color:var(--gr)">Prop Line HR</div>
        ${_propTop.map((l,i)=>{const hr=(l.wins/l.plays*100).toFixed(0)+'%';const hrc2=l.wins/l.plays>=.6?'var(--gr)':l.wins/l.plays>=.55?'var(--yl)':'var(--tx)';return`<div class="lb-row"><span style="color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90px">${l.name}</span><span class="lb-v" style="color:${hrc2}">${hr}<span class="lb-ct">${l.wins}/${l.plays}</span></span></div>`;}).join('')}
      </div>
      <div class="lb-col">
        <div class="lb-hdr" style="color:var(--bl)">Min Line HR</div>
        ${_minLdrs.map(l=>{const hr=(l.w/l.g*100).toFixed(0)+'%';const hrc2=l.w/l.g>=.6?'var(--gr)':l.w/l.g>=.55?'var(--yl)':'var(--tx)';return`<div class="lb-row"><span style="color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90px">${l.name}</span><span class="lb-v" style="color:${hrc2}">${hr}<span class="lb-ct">${l.w}/${l.g}</span></span></div>`;}).join('')}
      </div>
    </div>`;
  }
  ldrs.forEach((l,idx)=>{
    const i=_allLdrs.indexOf(l);
    const hr2=(l.wins/l.plays*100).toFixed(1);
    const hrC=+hr2>=60?'var(--gr)':+hr2>=55?'var(--yl)':'var(--tx)';
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    const rankC=i<10?'var(--yl)':'var(--tx3)';
    const isExp=leaderExp.has(l.name);
    const avgDelta=l.deltaCount>0?(l.totalDelta/l.deltaCount).toFixed(1):'—';
    h+=`<div class="lrow ${isExp?'lrow-expanded':''}" onclick="toggleLeader('${l.name.replace(/'/g,"\\'")}')">
      <div style="font:700 11px var(--M);color:${rankC};width:22px;text-align:center;flex-shrink:0">${medal||(i+1)}</div>
      <div style="flex:1;min-width:0;overflow:hidden">
        <div style="display:flex;align-items:center;gap:4px;overflow:hidden">
          <span style="font:600 12px var(--S);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${l.name}</span>
          ${l.team?`<span style="font:500 7px var(--M);color:var(--tx4);padding:1px 4px;border-radius:3px;background:var(--bg2);flex-shrink:0">${l.team}</span>`:''}
        </div>
        <div style="font:400 9px var(--S);color:var(--tx3);margin-top:1px">${[
          l.apex?`<span style="color:#34d399">${l.apex}A</span>`:'',
          l.ultra?`<span style="color:var(--yl)">${l.ultra}U</span>`:'',
          l.elite?`<span style="color:var(--vi)">${l.elite}E</span>`:'',
          l.strong?`<span style="color:var(--bl)">${l.strong}S</span>`:'',
          l.play?`<span style="color:#2dd4bf">${l.play}P</span>`:'',
        ].filter(Boolean).join(' · ')} · ${l.plays} plays · Avg Δ: ${avgDelta}</div>
        ${isExp?renderLeaderDrill(l):''}
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font:700 15px var(--M);color:${hrC}">${hr2}%</div>
        <div style="font:400 8px var(--M);color:var(--tx4)">${l.wins}W/${l.plays-l.wins}L</div>
      </div>
    </div>`;
  });
  if(!ldrs.length) h+=`<div class="ld">No players match search</div>`;
  return h;
}

function renderLeaderDrill(l) {
  const playerPlays=P.filter(p=>p.player===l.name&&(p.result==='WIN'||p.result==='LOSS')).sort((a,b)=>b.date.localeCompare(a.date));
  const showAll=leaderShowAll.has(l.name);
  const display=showAll?playerPlays:playerPlays.slice(0,10);
  let h=`<div class="drill" onclick="event.stopPropagation()">
    <div style="font:600 8px var(--M);color:var(--tx3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px">Recent Props &middot; ${l.plays} total &middot; ${l.wins}W/${l.plays-l.wins}L &middot; ${(l.wins/l.plays*100).toFixed(1)}% HR</div>`;
  display.forEach(p=>{
    const resC=p.result==='WIN'?'var(--gr)':'var(--rd)';
    const dirC=(p.dir==='OVER'||p.dir==='LEAN OVER')?'var(--ov)':'var(--un)';
    h+=`<div class="drill-row">
      <span style="color:var(--tx3);font:400 9px var(--M);min-width:52px">${p.date.slice(5)}</span>
      <span style="color:var(--tx2);font:400 9px var(--S);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.match}</span>
      <span style="color:${dirC};font:600 8px var(--M);min-width:36px;text-align:center">${p.dir}</span>
      <span style="font:500 9px var(--M);min-width:28px;text-align:center">${p.line}</span>
      ${tierBadge(p)}
      <span style="font:700 9px var(--M);color:${resC};min-width:32px;text-align:right">${p.result}${p.delta!=null?' '+(p.delta>0?'+':'')+p.delta:''}</span>
    </div>`;
  });
  if(playerPlays.length>10&&!showAll){
    h+=`<div style="text-align:center;margin-top:6px"><span style="font:500 9px var(--M);color:var(--bl);cursor:pointer;padding:4px 12px;border-radius:6px;background:var(--blA);border:1px solid rgba(56,189,248,.25)" onclick="event.stopPropagation();leaderShowAll.add('${l.name.replace(/'/g,"\\'")}');render()">View All ${playerPlays.length} Props</span></div>`;
  }
  h+=`</div>`;
  return h;
}

// ─── STATS TAB ───
function renderStats(DS,totalPlays,totalGraded,totalWins,
  totalApex,totalApexW,totalUltra,totalUltraW,
  totalElite,totalEliteW,totalStrong,totalStrongW,
  totalPlay,totalPlayW,totalSkip,totalSkipW,totalLeanG,totalLeanW) {
  let h='';
  const seasonHR=totalGraded?(totalWins/totalGraded*100).toFixed(1):'0.0';
  const _hr=(w,t)=>t?(w/t*100).toFixed(1)+'%':'—';
  const _hrc=(w,t)=>!t?'var(--tx)':w/t>=.55?'var(--gr)':w/t<.5?'var(--rd)':'var(--yl)';
  const _gradedTiers=new Set(['APEX','ULTRA','ELITE','STRONG','PLAY+']);

  // Pre-compute graded plays for position analysis (APEX-PLAY+ only, non-lean, non-DNP)
  const gradedP=P.filter(p=>
    _gradedTiers.has(p.elite_tier)&&
    (p.result==='WIN'||p.result==='LOSS')&&
    !isLean(p)&&!isDNP(p));

  function posOf(p){
    const pos=(p.position||'').toLowerCase();
    if(pos.includes('guard')||pos==='g'||pos==='pg'||pos==='sg') return 'Guard';
    if(pos.includes('forward')||pos==='f'||pos==='sf'||pos==='pf') return 'Forward';
    if(pos.includes('center')||pos==='c') return 'Center';
    return 'Other';
  }

  // ── SEASON OVERVIEW ──
  h+=`<div class="stat-card">
    <div style="font:600 8px var(--M);color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Season Overview — ${curSeason}</div>
    <div class="g4">
      <div class="kv"><div class="kv-l">Total Plays</div><div class="kv-v" style="font-size:13px">${totalPlays.toLocaleString()}</div></div>
      <div class="kv"><div class="kv-l">Graded</div><div class="kv-v" style="font-size:13px">${totalGraded.toLocaleString()}</div></div>
      <div class="kv"><div class="kv-l">W / L</div><div class="kv-v" style="font-size:13px">${totalWins} / ${totalGraded-totalWins}</div></div>
      <div class="kv"><div class="kv-l">HR%</div><div class="kv-v" style="color:${hrc(+seasonHR)};font-size:13px">${seasonHR}%</div></div>
    </div>
    <div class="stat-bar"><div class="stat-fill" style="width:${seasonHR}%;background:${hrc(+seasonHR)}"></div></div>
  </div>`;

  // ── TIER BREAKDOWN (APEX-PLAY+ in graded; SKIP separate) ──
  const activeTiers=[
    {lbl:'APEX',   n:totalApex,  w:totalApexW,  c:'#34d399',   desc:'≥81% · 2.5u'},
    {lbl:'ULTRA',  n:totalUltra, w:totalUltraW, c:'var(--yl)', desc:'≥78% · 2u'},
    {lbl:'ELITE',  n:totalElite, w:totalEliteW, c:'var(--vi)', desc:'≥75% · 2u'},
    {lbl:'STRONG', n:totalStrong,w:totalStrongW,c:'var(--bl)', desc:'≥72% · 1.5u'},
    {lbl:'PLAY+',  n:totalPlay,  w:totalPlayW,  c:'#2dd4bf',   desc:'≥68% · 1.2u'},
  ];
  h+=`<div class="stat-card">
    <div style="font:600 8px var(--M);color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">Tier Breakdown <span style="color:var(--tx4)">(Graded = APEX→PLAY+ only)</span></div>
    ${activeTiers.map(t=>{
      const hr=_hr(t.w,t.n); const hrc2=_hrc(t.w,t.n); const pct=t.n?(t.w/t.n*100).toFixed(1):0;
      return`<div style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
          <span style="font:700 10px var(--M);color:${t.c}">${t.lbl} <span style="font:400 8px var(--S);color:var(--tx4)">${t.desc}</span></span>
          <span style="font:700 11px var(--M);color:${hrc2}">${hr} <span style="font:400 8px var(--M);color:var(--tx4)">${t.w}W/${t.n-t.w}L · ${t.n}p</span></span>
        </div>
        <div class="stat-bar"><div class="stat-fill" style="width:${pct}%;background:${t.c}"></div></div>
      </div>`;
    }).join('')}
    <div style="padding:8px 10px;background:rgba(100,116,139,.07);border-radius:7px;border:1px solid rgba(100,116,139,.15);margin-top:4px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font:600 9px var(--M);color:var(--tx3)">SKIP <span style="font:400 8px var(--S);color:var(--tx4)">· Engine conflict · not in graded HR</span></span>
        <span style="font:700 10px var(--M);color:${_hrc(totalSkipW,totalSkip)}">${_hr(totalSkipW,totalSkip)} <span style="font:400 8px var(--M);color:var(--tx4)">${totalSkipW}W/${totalSkip-totalSkipW}L · ${totalSkip}p</span></span>
      </div>
      <div class="stat-bar"><div class="stat-fill" style="width:${totalSkip?(totalSkipW/totalSkip*100).toFixed(1):0}%;background:var(--tx3)"></div></div>
    </div>
  </div>`;

  // ── POSITION BREAKDOWN — OVERALL (graded plays only) ──
  const POS=['Guard','Forward','Center'];
  const TIERS_DEF=[
    {et:'APEX',  c:'#34d399'},{et:'ULTRA', c:'var(--yl)'},
    {et:'ELITE', c:'var(--vi)'},{et:'STRONG',c:'var(--bl)'},{et:'PLAY+', c:'#2dd4bf'}
  ];

  // Build position × tier matrix from graded plays
  const posTierMatrix={};
  POS.forEach(pos=>{
    posTierMatrix[pos]={plays:0,wins:0};
    TIERS_DEF.forEach(t=>{ posTierMatrix[pos][t.et]={plays:0,wins:0}; });
  });
  gradedP.forEach(p=>{
    const pos=posOf(p); if(!posTierMatrix[pos]) return;
    const et=p.elite_tier;
    posTierMatrix[pos].plays++; if(p.result==='WIN') posTierMatrix[pos].wins++;
    if(posTierMatrix[pos][et]){
      posTierMatrix[pos][et].plays++; if(p.result==='WIN') posTierMatrix[pos][et].wins++;
    }
  });

  h+=`<div class="stat-card">
    <div style="font:600 8px var(--M);color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">Position Breakdown — Overall</div>
    ${POS.filter(pos=>posTierMatrix[pos].plays>0).map(pos=>{
      const pm=posTierMatrix[pos];
      const posHR=_hr(pm.wins,pm.plays); const posHRc=_hrc(pm.wins,pm.plays);
      const pct=pm.plays?(pm.wins/pm.plays*100).toFixed(1):0;
      return`<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
          <span style="font:700 11px var(--M);color:var(--tx)">${pos}</span>
          <span style="font:700 11px var(--M);color:${posHRc}">${posHR} <span style="font:400 8px var(--M);color:var(--tx4)">${pm.wins}W/${pm.plays-pm.wins}L · ${pm.plays}p</span></span>
        </div>
        <div class="stat-bar" style="margin-bottom:5px"><div class="stat-fill" style="width:${pct}%;background:${posHRc}"></div></div>
        <div style="display:flex;gap:4px;flex-wrap:wrap">
          ${TIERS_DEF.map(t=>{
            const td=pm[t.et]; if(!td||!td.plays) return '';
            const thr=_hr(td.wins,td.plays); const thrc=_hrc(td.wins,td.plays);
            return`<div style="background:${t.c}11;border:1px solid ${t.c}33;border-radius:6px;padding:3px 6px;text-align:center;flex:1;min-width:0">
              <div style="font:700 7px var(--M);color:${t.c}">${t.et}</div>
              <div style="font:700 10px var(--M);color:${thrc};margin-top:1px">${thr}</div>
              <div style="font:400 6px var(--M);color:var(--tx4)">${td.wins}W/${td.plays-td.wins}L</div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}
  </div>`;

  // ── MONTHLY BREAKDOWN — with tier breakdown per position ──
  const months=[...new Set(DS.map(d=>d.date.slice(0,7)))].sort();
  h+=`<div class="stat-card">
    <div style="font:600 8px var(--M);color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Monthly Breakdown</div>`;
  months.forEach(m=>{
    const mDs=DS.filter(d=>d.date.startsWith(m));
    const mg=mDs.reduce((s,d)=>s+d.graded,0),mw=mDs.reduce((s,d)=>s+d.wins,0);
    const mp=mDs.reduce((s,d)=>s+d.plays,0);
    const mhr=mg?(mw/mg*100).toFixed(1):'—';
    const[y,mo]=m.split('-');
    const mLbl=new Date(+y,+mo-1,1).toLocaleDateString('en-US',{month:'short',year:'2-digit'});
    const hrC=mg&&mw/mg>=.55?'var(--gr)':mg&&mw/mg<.5?'var(--rd)':'var(--yl)';
    // Tier breakdown for this month
    const mApex=mDs.reduce((s,d)=>s+(d.apex||0),0),mApexW=mDs.reduce((s,d)=>s+(d.apexW||0),0);
    const mUltra=mDs.reduce((s,d)=>s+(d.ultra||0),0),mUltraW=mDs.reduce((s,d)=>s+(d.ultraW||0),0);
    const mElite=mDs.reduce((s,d)=>s+(d.elite||0),0),mEliteW=mDs.reduce((s,d)=>s+(d.eliteW||0),0);
    const mStrong=mDs.reduce((s,d)=>s+(d.strong||0),0),mStrongW=mDs.reduce((s,d)=>s+(d.strongW||0),0);
    const mPlay=mDs.reduce((s,d)=>s+(d.play||0),0),mPlayW=mDs.reduce((s,d)=>s+(d.playW||0),0);
    // Position breakdown for this month
    const mPlays=gradedP.filter(p=>p.date.startsWith(m));
    const mPosTier={};
    POS.forEach(pos=>{
      const pp=mPlays.filter(p=>posOf(p)===pos);
      const pw=pp.filter(p=>p.result==='WIN').length;
      mPosTier[pos]={plays:pp.length,wins:pw};
      TIERS_DEF.forEach(t=>{
        const tp=pp.filter(p=>p.elite_tier===t.et);
        mPosTier[pos][t.et]={plays:tp.length,wins:tp.filter(p=>p.result==='WIN').length};
      });
    });
    h+=`<div style="padding:8px 0;border-bottom:1px solid var(--bg2)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
        <span style="font:700 11px var(--M)">${mLbl}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font:400 9px var(--S);color:var(--tx3)">${mp}p · ${mw}W/${mg-mw}L</span>
          <span style="font:700 11px var(--M);color:${hrC}">${mhr}%</span>
        </div>
      </div>
      <div style="display:flex;gap:3px;margin-bottom:5px">
        ${[
          [mApex,mApexW,'#34d399','A'],
          [mUltra,mUltraW,'var(--yl)','U'],
          [mElite,mEliteW,'var(--vi)','E'],
          [mStrong,mStrongW,'var(--bl)','S'],
          [mPlay,mPlayW,'#2dd4bf','P+'],
        ].map(([tot,wins,c,lbl])=>tot?`<div style="flex:${tot};min-width:0;height:18px;background:${c}22;border:1px solid ${c}44;border-radius:4px;display:flex;align-items:center;justify-content:center;overflow:hidden">
          <span style="font:700 7px var(--M);color:${c};white-space:nowrap">${lbl} ${_hr(wins,tot)}</span>
        </div>`:''
        ).join('')}
      </div>
      <div style="display:flex;gap:4px">
        ${POS.filter(pos=>mPosTier[pos]&&mPosTier[pos].plays>0).map(pos=>{
          const pm=mPosTier[pos];
          const posHR=_hr(pm.wins,pm.plays); const posHRc=_hrc(pm.wins,pm.plays);
          return`<div style="flex:1;background:var(--bg);border-radius:6px;padding:4px 5px;border:1px solid var(--bg2)">
            <div style="font:600 7px var(--M);color:var(--tx3);margin-bottom:3px">${pos.slice(0,3).toUpperCase()}</div>
            <div style="font:700 10px var(--M);color:${posHRc}">${posHR}</div>
            <div style="font:400 6px var(--M);color:var(--tx4)">${pm.plays}p · ${pm.wins}W</div>
            <div style="display:flex;gap:2px;margin-top:3px">
              ${TIERS_DEF.map(t=>{
                const td=pm[t.et]; if(!td||!td.plays) return '';
                return`<div style="flex:${td.plays};height:3px;border-radius:2px;background:${t.c}" title="${t.et} ${_hr(td.wins,td.plays)}"></div>`;
              }).join('')}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });
  h+=`</div>`;

  // ── DIRECTION BREAKDOWN ──
  const dirBucket={'OVER':{p:0,w:0},'UNDER':{p:0,w:0},'LEAN OVER':{p:0,w:0},'LEAN UNDER':{p:0,w:0}};
  P.forEach(p=>{
    if(p.result!=='WIN'&&p.result!=='LOSS'||isDNP(p)) return;
    if(dirBucket[p.dir]){dirBucket[p.dir].p++;if(p.result==='WIN')dirBucket[p.dir].w++;}
  });
  h+=`<div class="stat-card">
    <div style="font:600 8px var(--M);color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Direction Breakdown</div>
    <div class="g4">${Object.entries(dirBucket).filter(([_,v])=>v.p>0).map(([dir,v])=>{
      const hr=(v.p?(v.w/v.p*100).toFixed(1):'0.0');
      const c=dir.includes('OVER')?'var(--ov)':'var(--un)';
      return`<div class="kv"><div class="kv-l">${dir}</div><div class="kv-v" style="color:${c};font-size:13px">${hr}%</div><div style="font:400 7px var(--M);color:var(--tx4);margin-top:2px">${v.p}p · ${v.w}W</div></div>`;
    }).join('')}</div>
  </div>`;

  return h;
}
// ─── NAV / INTERACTION ───
function jumpToMonth(m){const dates=allDates();const md=dates.filter(d=>d.startsWith(m));if(md.length)di=dates.indexOf(md[md.length-1]);}
function tgl(k){const now=Date.now();const isDouble=(k===_lastTap)&&(now-_lastTapTime<400);_lastTap=k;_lastTapTime=now;if(isDouble){if(exp.has(k))exp.delete(k);else exp.add(k);}else{if(exp.has(k)){exp.delete(k);}else{exp.clear();exp.add(k);}}render();}
function toggleLeader(name){if(leaderExp.has(name)){leaderExp.delete(name);leaderShowAll.delete(name);}else{leaderExp.clear();leaderShowAll.clear();leaderExp.add(name);}render();}
function setSpk(k,prop,val){if(!expSpk[k])expSpk[k]={win:'L10',venue:'all',line:'prop',customMin:null};expSpk[k][prop]=val;render();}
function setSpkMin(k,v){if(!expSpk[k])expSpk[k]={win:'L10',venue:'all',line:'prop',customMin:null};expSpk[k].customMin=v?parseFloat(v):null;render();}

// ─── BOOT ───
loadSeason('2025-26');
</script>
