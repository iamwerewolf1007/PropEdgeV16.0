<body>
<div class="app" id="app"></div>
<script>
// ─── STATE ───
let P = [];
let curSeason = '2025-26';
let di = 0;
let tab = 'daily';
let selMon = '';
let fDir = 'all', fRes = 'all', fTier = 'all', fMatch = 'all', fConf = 0, srt = 'def', fSearch = '';
let exp = new Set();
let _lastTap = '', _lastTapTime = 0;
let leaderExp = new Set();
// Per-card sparkline state: key → {win:'L10', venue:'all', line:'prop', customMin:null}
let expSpk = {};
let leaderShowAll = new Set();

// ─── RENDER CACHE ────────────────────────────────────────────────────────────
// All heavy aggregations run once in _buildCache() immediately after loadSeason.
// render() reads from _cache — never touches P directly for season-level stats.
let _cache = {
  DS: null,          // computeSeasonStats() result
  dates: null,       // sorted unique date strings
  latestDate: '',    // last date in dates (used by isDNP without re-mapping P)
  dateIdx: null,     // Map<date,index> for O(1) indexOf
  totals: null,      // season-wide play/graded/wins totals per tier
  strip: null,       // season HR per tier (APEX/ULTRA/ELITE/STRONG/PLAY+)
  leaders: null,     // sorted leaderboard array
  minLdrs: null,     // min-line leaderboard
};
let _sparkUid = 0;  // deterministic sparkline filter ID counter (reset each render)

// ─── V14 FIELD NORMALISER ───
function normalisePlay(p) {
  // Direction — normalise LEAN OVER/UNDER → OVER/UNDER (prediction model has no lean concept)
  p.dir = p.dir || p.direction || '';
  if (p.dir === 'LEAN OVER')  p.dir = 'OVER';
  if (p.dir === 'LEAN UNDER') p.dir = 'UNDER';

  // Match / game — build proper fixture string
  // Priority: stored match → game (full name) → away@home (abbrevs) → opponent abbrev
  if (!p.match || p.match === p.opponent) {
    if (p.game && p.game !== 'None' && p.game !== 'null') {
      p.match = p.game;
    } else if (p.away && p.home && p.away !== 'None' && p.home !== 'None') {
      p.match = p.away + ' @ ' + p.home;
    } else {
      p.match = p.opponent || '';
    }
  }
  // fullMatch: same logic
  if (!p.fullMatch || p.fullMatch === p.opponent) {
    p.fullMatch = p.match;
  }

  // gameTime: V14 stores as game_time (from Excel Game_Time_ET)
  p.gameTime = p.gameTime || p.game_time || '';

  // team badge: not in V14 JSON
  p.team = p.team || '';

  // isHome: derive from home/away fields vs opponent
  // For live plays: home/away are team abbreviations
  // For backtest: same if Excel had them
  if (p.isHome == null) {
    if (p.home && p.away && p.opponent) {
      // player is away if their opponent is the home team
      p.isHome = p.opponent.toUpperCase() === p.home.toUpperCase() ? true : false;
    } else if (p.recent20 && p.recent20.length && typeof p.recent20[0] === 'object') {
      // fall back to last recent game venue before we convert
      const last = p.recent20[p.recent20.length - 1];
      p.isHome = last.home === true ? true : last.home === false ? false : null;
    } else {
      p.isHome = null;
    }
  }

  // l20: approximate as midpoint of l10 and l30
  if (p.l20 == null && p.l10 != null && p.l30 != null) {
    p.l20 = +((p.l10 + p.l30) / 2).toFixed(1);
  }

  // flagsStr
  if (p.flags != null && p.flagsStr == null) p.flagsStr = p.flags + '/10';

  // flagDetails: build from flag count if missing
  if (!p.flagDetails || !p.flagDetails.length) {
    const names = ['Volume','HR L30','HR L10','Trend','Context','Defense','H2H','Pace','FG Trend','Min Trend'];
    const agrees = Math.round(p.flags || 0);
    p.flagDetails = names.map((name, i) => ({ name, agrees: i < agrees, detail: '' }));
  }

  // volume & trend
  p.volume = p.volume != null ? p.volume : (p.l30 != null && p.line != null ? +(p.l30 - p.line).toFixed(1) : null);
  p.trend  = p.trend  != null ? p.trend  : (p.momentum != null ? +p.momentum.toFixed(1) : null);

  // hr10/hr30: V14 decimal → integer %
  p.hr10Pct = p.hr10 != null ? Math.round(p.hr10 * 100) : null;
  p.hr30Pct = p.hr30 != null ? Math.round(p.hr30 * 100) : null;

  // recent20: objects → split into numbers + homes BEFORE isHome was derived above,
  // but isHome derivation from recent20 only fires if home/away fields are absent.
  // Safe to convert now.
  if (p.recent20 && p.recent20.length && typeof p.recent20[0] === 'object') {
    p.recent20homes = p.recent20.map(r => r.home === true);
    p.recent20dates = p.recent20.map(r => r.date || '');
    p.recent20 = p.recent20.map(r => r.pts);
  }

  // recentOver / Under
  if (Array.isArray(p.recent20)) {
    p.recentOver  = p.recent20.filter(v => v > p.line).length;
    p.recentUnder = p.recent20.filter(v => v <= p.line).length;
  }

  // H2H aliases
  p.h2hG          = p.h2hG          ?? p.h2h_games  ?? 0;
  p.h2h           = p.h2h           ?? p.h2h_avg     ?? null;
  p.h2hTsDev      = p.h2hTsDev      ?? p.h2h_ts_dev  ?? null;
  p.h2hFgaDev     = p.h2hFgaDev     ?? p.h2h_fga_dev ?? null;
  p.h2hConfidence = p.h2hConfidence ?? p.h2h_conf     ?? null;
  p.h2hProfile    = p.h2hProfile    ?? null;

  // DVP / pace aliases (V14 names)
  p.defP = p.defP ?? p.defP_dynamic ?? null;
  p.pace = p.pace ?? p.pace_rank    ?? null;

  // Shooting / minutes — V14 field names → V12-style camelCase
  p.fga10  = p.fga10  ?? p.fga_l10  ?? null;
  p.minL10 = p.minL10 ?? p.min_l10  ?? null;
  p.minL30 = p.minL30 ?? p.min_l30  ?? null;
  // FG% — not in V14 JSON; leave as null → shows "—"
  p.fgL10  = p.fgL10  ?? null;
  p.fgL30  = p.fgL30  ?? null;
  p.fga30  = p.fga30  ?? null;
  // Min trend — derive as recent_min vs min_l10 if available
  p.minTrend = p.minTrend ?? null;
  p.fgTrend  = p.fgTrend  ?? null;

  // Home/away scoring (V14 has home_l10, away_l10 from rolling engine)
  p.homeAvgPts = p.homeAvgPts ?? p.home_l10 ?? null;
  p.awayAvgPts = p.awayAvgPts ?? p.away_l10 ?? null;

  // Decision signal aliases — map snake_case JSON keys → dashboard camelCase
  p.usage_l10       = p.usage_l10       ?? null;
  p.usage_l30       = p.usage_l30       ?? null;
  p.min_cv          = p.min_cv          ?? null;
  p.fta_l10         = p.fta_l10         ?? null;
  p.ft_rate         = p.ft_rate         ?? null;
  p.fg3a_l10        = p.fg3a_l10        ?? null;
  p.pts_per_min     = p.pts_per_min     ?? null;
  p.home_away_split = p.home_away_split ?? null;
  p.level_ewm       = p.level_ewm       ?? null;
  p.line_vs_l30     = p.line_vs_l30     ?? null;
  p.extreme_hot     = p.extreme_hot     ?? null;
  p.extreme_cold    = p.extreme_cold    ?? null;
  p.is_long_rest    = p.is_long_rest    ?? null;
  p.recent_min_trend= p.recent_min_trend?? null;
  p.h2h_trend       = p.h2h_trend       ?? null;
  // min_line / max_line from prop data
  p.min_line = p.min_line ?? null;
  p.max_line = p.max_line ?? null;

  // V14-specific
  p.enginesAgree      = p.enginesAgree      !== undefined ? p.enginesAgree : true;
  p.meanReversionRisk = p.meanReversionRisk ?? 0;
  p.earlySeasonW      = p.earlySeasonW      ?? 1.0;
  p.seasonProgress    = p.seasonProgress    ?? 0.5;
  p.calProb           = p.calProb           ?? null;
  p.volRisk           = p.volRisk           ?? p.vol_risk        ?? null;
  p.lineSharpness     = p.lineSharpness     ?? p.line_sharpness  ?? null;
  p.sourceSynth       = p.source === 'synthetic';

  // V16 Elite field normalisation
  p.elite_tier   = p.elite_tier   || null;
  p.elite_prob   = p.elite_prob   != null ? +p.elite_prob   : null;
  p.v12_clf_prob = p.v12_clf_prob != null ? +p.v12_clf_prob : null;
  p.v12_clf_conv = p.v12_clf_conv != null ? +p.v12_clf_conv : null;
  p.v14_clf_prob = p.v14_clf_prob != null ? +p.v14_clf_prob : null;
  p.trust_mean   = p.trust_mean   != null ? +p.trust_mean   : null;
  p.q25_v12      = p.q25_v12      != null ? +p.q25_v12      : null;
  p.q75_v12      = p.q75_v12      != null ? +p.q75_v12      : null;
  p.q_confidence = p.q_confidence != null ? +p.q_confidence : null;
  p.real_gap_v92 = p.real_gap_v92 != null ? +p.real_gap_v92 : null;
  p.real_gap_v12 = p.real_gap_v12 != null ? +p.real_gap_v12 : null;
  p.v12_extreme  = !!p.v12_extreme;
  p.reg_consensus= !!p.reg_consensus;
  p.all_clf_agree= !!p.all_clf_agree;
  p.elite_stake  = p.elite_stake  != null ? +p.elite_stake  : null;

  // lineHistory
  p.lineHistory = p.lineHistory || [];

  // posSimple for matchup label
  p.posSimple = p.posSimple || p.position || '';

  // ── PLAYER NAME NORMALISATION (fuzzy) ────────────────────────────
  // Ensures names from Excel prop lines match names from game log CSV.
  // Handles: trailing Jr/Jr./Sr/II/III, accented chars (ć→c, č→c, etc.)
  // The canonical name is stored; search/leaders use normalised form.
  if (p.player) {
    p.playerNorm = p.player
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')  // strip accents: ć→c
      .replace(/\s+jr\.?$/i,'').replace(/\s+sr\.?$/i,'') // strip Jr/Jr./Sr
      .replace(/\s+i{2,3}$/i,'').replace(/\s+iv$/i,'')   // strip II/III/IV
      .replace(/\s+/g,' ').trim().toLowerCase();
  }

  return p;
}

// ─── HELPERS ───
const clr = (v, r) => v == null ? 'var(--tx)' : v > r ? 'var(--gr)' : v < r ? 'var(--rd)' : 'var(--tx)';
const hrc = r => r >= 55 ? 'var(--gr)' : r <= 40 ? 'var(--rd)' : 'var(--tx)';
const cfc = c => c >= .75 ? '#34d399' : c >= .68 ? 'var(--bl)' : c >= .60 ? 'var(--yl)' : 'var(--tx3)';
function allDates() {
  if (!_cache.dates) _cache.dates = [...new Set(P.map(p => p.date))].sort();
  return _cache.dates;
}
function latestDate() {
  if (!_cache.latestDate) {
    const d = allDates(); _cache.latestDate = d[d.length-1] || '';
  }
  return _cache.latestDate;
}
function isVoid(p) { const r = p.result; return r === 'PUSH' || r === 'NO_PLAY' || r === 'NO PLAY'; }
// DNP: explicit 'DNP' result OR empty result on a completed past date
// Uses _cache.latestDate directly — no function call chain, no P.map per check
function isDNP(p) {
  if (p.result === 'DNP') return true;
  if ((p.result === '' || p.result == null) && p.date && p.date < _cache.latestDate) return true;
  return false;
}
// isLean no longer used — LEAN OVER/UNDER treated as OVER/UNDER per prediction model
// Kept as no-op for any legacy references
function isLean(p) { return false; }

function tierBadge(p) {
  const et = p.elite_tier || p.tierLabel || ('T' + p.tier);
  switch(et) {
    case 'APEX':   return '<span class="tier-badge tier-apex" style="animation:glow-apex 2s ease-in-out infinite">⬡ APEX</span>';
    case 'ULTRA':  return '<span class="tier-badge tier-ultra-e">★★ ULTRA</span>';
    case 'ELITE':  return '<span class="tier-badge tier-elite">★ ELITE</span>';
    case 'STRONG': return '<span class="tier-badge tier-strong">STRONG</span>';
    case 'PLAY+':  return '<span class="tier-badge tier-play-plus">PLAY+</span>';
    case 'SKIP':   return '<span class="tier-badge tier-lean">SKIP</span>';
    case 'T1_ULTRA':   return '<span class="tier-badge tier-apex">⬡ APEX</span>';
    case 'T1_PREMIUM': return '<span class="tier-badge tier-ultra-e">★★ ULTRA</span>';
    case 'T1':         return '<span class="tier-badge tier-elite">★ ELITE</span>';
    case 'T2':         return '<span class="tier-badge tier-strong">STRONG</span>';
    case 'T3':         return '<span class="tier-badge tier-play-plus">PLAY+</span>';
    case 'T3_LEAN':    return '<span class="tier-badge tier-lean">LEAN ' + (p.dir&&p.dir.includes('OVER')?'↗':'↘') + '</span>';
    default:           return '<span class="tier-badge tier-strong">PLAY+</span>';
  }
}

const POS_FULL = {
  'G':'Guard','PG':'Point Guard','SG':'Shooting Guard','F':'Forward',
  'SF':'Small Forward','PF':'Power Forward','C':'Center',
  'F-C':'Forward-Center','C-F':'Center-Forward','G-F':'Guard-Forward','F-G':'Forward-Guard',
  'Guard':'Guard','Forward':'Forward','Center':'Center',
};
function posLabel(p) {
  const pos = p.position || p.posSimple || '';
  return POS_FULL[pos] || POS_FULL[pos.split('-')[0]] || pos || '';
}

const _B = window.location.pathname.replace(/\/index\.html$/,'').replace(/\/$/,'');

// ─── DATA LOADING ───
async function loadSeason(season) {
  curSeason = season;
  const el = document.getElementById('app');
  el.innerHTML = `<div style="text-align:center;padding:60px 20px">
    <div style="font:800 22px var(--M);background:linear-gradient(135deg,var(--bl),var(--vi));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px">PropEdge V16.0</div>
    <div id="load-status" style="font:400 12px var(--S);color:var(--tx3);margin-bottom:16px">Loading ${season} data...</div>
    <div style="height:3px;background:var(--bg2);border-radius:2px;max-width:200px;margin:0 auto;overflow:hidden"><div style="height:100%;width:40%;background:linear-gradient(90deg,var(--bl),var(--vi));border-radius:2px;animation:pulse 1.2s ease-in-out infinite"></div></div></div>`;

  const setStatus = (msg) => {
    const s = document.getElementById('load-status');
    if (s) s.textContent = msg;
  };

  try {
    let raw = [];
    const seasonKey = season === '2024-25' ? '2024_25' : '2025_26';

    // Step 1: Load index to discover which monthly files exist
    setStatus(`Loading ${season} index...`);
    const idxUrl = `${_B}/data/monthly/${seasonKey}/index.json?t=${Date.now()}`;
    const idxR = await fetch(idxUrl).catch(() => null);

    if (idxR && idxR.ok) {
      // Monthly split mode — load all month files in parallel
      const index = await idxR.json();
      const months = index.months || [];
      setStatus(`Loading ${season} — ${months.length} months...`);

      const monthResults = await Promise.allSettled(
        months.map(m =>
          fetch(`${_B}/data/monthly/${seasonKey}/${m}.json?t=${Date.now()}`)
            .then(r => r.ok ? r.json() : [])
            .catch(() => [])
        )
      );

      let loaded = 0;
      for (const result of monthResults) {
        if (result.status === 'fulfilled' && Array.isArray(result.value)) {
          raw = raw.concat(result.value);
          loaded++;
          setStatus(`Loaded ${loaded}/${months.length} months (${raw.length.toLocaleString()} plays)...`);
        }
      }
    } else {
      // Fallback: try legacy single-file approach
      setStatus(`Loading ${season} (legacy mode)...`);
      const legacyUrl = `${_B}/data/season_${season.replace('-','_')}.json?t=${Date.now()}`;
      const legR = await fetch(legacyUrl);
      if (!legR.ok) throw new Error(`HTTP ${legR.status} — monthly files not found. Run: python3 run.py generate`);
      raw = await legR.json();
    }

    // For 2025-26: merge with today.json
    if (season === '2025-26') {
      setStatus('Loading today\'s predictions...');
      const todayData = await fetch(`${_B}/data/today.json?t=${Date.now()}`)
        .then(r => r.ok ? r.json() : []).catch(() => []);
      raw = mergeSeasonWithToday(raw, todayData);
    }

    setStatus(`Building dashboard (${raw.length.toLocaleString()} plays)...`);
    P = raw.map(normalisePlay);
    P.sort((a,b) => a.tier - b.tier || b.conf - a.conf);
    _cache = {DS:null,dates:null,latestDate:'',dateIdx:null,totals:null,strip:null,leaders:null,minLdrs:null};
    _buildCache();
    const dates = _cache.dates;
    di = dates.length - 1;
    selMon = dates[di] ? dates[di].slice(0,7) : '';
    fDir='all'; fRes='all'; fTier='all'; fMatch='all'; fConf=0; srt='def'; fSearch='';
    exp.clear(); leaderExp.clear(); leaderShowAll.clear();
    render();
  } catch(e) {
    el.innerHTML = `<div style="text-align:center;padding:40px">
      <div style="font:700 18px var(--M);color:var(--rd)">Load Error</div>
      <div style="font:400 12px var(--S);color:var(--tx3);margin:12px 0">${e.message}<br><br>Run: <code style="color:var(--bl)">python3 run.py generate</code></div>
      <button onclick="loadSeason('${season}')" style="padding:8px 20px;background:var(--blA);border:1px solid rgba(56,189,248,.3);color:var(--bl);border-radius:8px;font:500 11px var(--M);cursor:pointer">Retry</button></div>`;
  }
}

function mergeSeasonWithToday(seasonData, todayData) {
  if (!todayData || !todayData.length) return seasonData;
  // today.json only contains plays for the current batch date
  // Dates present in today.json
  const todayDates = new Set(todayData.map(p => p.date));
  // From season.json, keep plays for dates NOT in today.json,
  // plus WIN/LOSS graded plays for dates that ARE in today.json
  // (DNP from season.json for today's date get superseded by today.json)
  const kept = seasonData.filter(p => {
    if (!todayDates.has(p.date)) return true;
    // For today's dates: keep graded WIN/LOSS/LEAN from season JSON.
    // Ungraded ("" or null) season plays get superseded by fresh today.json scoring.
    return p.result === 'WIN' || p.result === 'LOSS' || p.result === 'LEAN';
  });
  // Add today.json plays that aren't already covered as WIN/LOSS in kept
  const keptKeys = new Set(kept.filter(p => todayDates.has(p.date)).map(p => p.player+'_'+p.date+'_'+p.line));
  const newToday = todayData.filter(p => !keptKeys.has(p.player+'_'+p.date+'_'+p.line));
  return [...kept, ...newToday];
}

// ─── SEASON STATS ───
function computeSeasonStats() {
  const byDate = {};
  P.forEach(p => {
    if (!byDate[p.date]) byDate[p.date] = {date:p.date,plays:0,graded:0,wins:0,losses:0,
      apex:0,apexW:0,ultra:0,ultraW:0,elite:0,eliteW:0,
      strong:0,strongW:0,play:0,playW:0,skip:0,skipW:0,
      leanG:0,leanW:0,games:new Set()};
    const d = byDate[p.date];
    d.plays++;
    if (p.match) d.games.add(p.match);
    const lean = isLean(p);
    const dnp  = isDNP(p);
    const et   = p.elite_tier||'';
    if ((p.result==='WIN'||p.result==='LOSS') && !dnp) {
      if (lean) {
        d.leanG++; if (p.result==='WIN') d.leanW++;
      } else {
        // ALL non-lean, non-DNP WIN/LOSS plays count toward total graded + HR
        // (SKIP plays included in totals — they are real results, just below tier threshold)
        d.graded++;
        if (p.result==='WIN') d.wins++; else d.losses++;
        if (et==='APEX')  { d.apex++;   if(p.result==='WIN') d.apexW++;  }
        else if(et==='ULTRA') { d.ultra++;  if(p.result==='WIN') d.ultraW++; }
        else if(et==='ELITE') { d.elite++;  if(p.result==='WIN') d.eliteW++; }
        else if(et==='STRONG'){ d.strong++; if(p.result==='WIN') d.strongW++;}
        else if(et==='PLAY+') { d.play++;   if(p.result==='WIN') d.playW++;  }
        else                  { d.skip++;   if(p.result==='WIN') d.skipW++;  }
      }
    }
  });
  return Object.values(byDate).map(d=>({...d,games:d.games.size,
    hr:d.graded?+(d.wins/d.graded*100).toFixed(1):0,
    leanHR:d.leanG?+(d.leanW/d.leanG*100).toFixed(1):null
  })).sort((a,b)=>a.date.localeCompare(b.date));
}

// ─── BUILD CACHE (called once after loadSeason — never during navigation) ────
function _buildCache() {
  // Dates & fast index
  _cache.dates      = [...new Set(P.map(p => p.date))].sort();
  _cache.latestDate = _cache.dates[_cache.dates.length - 1] || '';
  _cache.dateIdx    = new Map(_cache.dates.map((d, i) => [d, i]));

  // Season stats — one full P pass (never repeated on navigation)
  _cache.DS = computeSeasonStats();

  // Season totals — one pass over DS (tiny, already reduced)
  let tp=0,tg=0,tw=0,ta=0,taw=0,tu=0,tuw=0,te=0,tew=0,
      ts=0,tsw=0,tpl=0,tplw=0,tsk=0,tskw=0,tlg=0,tlw=0;
  _cache.DS.forEach(d => {
    tp+=d.plays; tg+=d.graded; tw+=d.wins;
    ta+=d.apex||0; taw+=d.apexW||0; tu+=d.ultra||0; tuw+=d.ultraW||0;
    te+=d.elite||0; tew+=d.eliteW||0; ts+=d.strong||0; tsw+=d.strongW||0;
    tpl+=d.play||0; tplw+=d.playW||0; tsk+=d.skip||0; tskw+=d.skipW||0;
    tlg+=d.leanG||0; tlw+=d.leanW||0;
  });
  _cache.totals = {
    totalPlays:tp, totalGraded:tg, totalWins:tw,
    totalApex:ta,   totalApexW:taw,  totalUltra:tu,  totalUltraW:tuw,
    totalElite:te,  totalEliteW:tew, totalStrong:ts,  totalStrongW:tsw,
    totalPlay:tpl,  totalPlayW:tplw, totalSkip:tsk,   totalSkipW:tskw,
    totalLeanG:tlg, totalLeanW:tlw,
  };

  // Strip — season-wide tier hit rates (5 filter passes, done once at load)
  const _ok = p => (p.result==='WIN'||p.result==='LOSS') && !isLean(p) && !isDNP(p);
  const _sA=P.filter(p=>p.elite_tier==='APEX'   && _ok(p));
  const _sU=P.filter(p=>p.elite_tier==='ULTRA'  && _ok(p));
  const _sE=P.filter(p=>p.elite_tier==='ELITE'  && _ok(p));
  const _sS=P.filter(p=>p.elite_tier==='STRONG' && _ok(p));
  const _sP=P.filter(p=>p.elite_tier==='PLAY+'  && _ok(p));
  _cache.strip = {
    sApexG:_sA,  sApexW:_sA.filter(p=>p.result==='WIN').length,
    sUltraG:_sU, sUltraW:_sU.filter(p=>p.result==='WIN').length,
    sEliteG:_sE, sEliteW:_sE.filter(p=>p.result==='WIN').length,
    sStrongG:_sS,sStrongW:_sS.filter(p=>p.result==='WIN').length,
    sPlayG:_sP,  sPlayW:_sP.filter(p=>p.result==='WIN').length,
  };

  // Leaders — single P pass, never rebuilt on navigation
  const bp = {};
  P.forEach(p => {
    if (!['WIN','LOSS'].includes(p.result) || isDNP(p)) return;
    if (!bp[p.player]) bp[p.player] = {name:p.player,team:p.team||'',
      plays:0,wins:0,apex:0,ultra:0,elite:0,strong:0,play:0,totalDelta:0,deltaCount:0};
    const lp = bp[p.player];
    lp.plays++; if (p.result==='WIN') lp.wins++;
    const et = p.elite_tier || '';
    if(et==='APEX')lp.apex++;else if(et==='ULTRA')lp.ultra++;
    else if(et==='ELITE')lp.elite++;else if(et==='STRONG')lp.strong++;
    else if(et==='PLAY+')lp.play++;
    if (p.delta!=null){lp.totalDelta+=Math.abs(p.delta);lp.deltaCount++;}
  });
  _cache.leaders = Object.values(bp).filter(x=>x.plays>=5)
    .sort((a,b)=>(b.wins/b.plays)-(a.wins/a.plays));
  window.leaderRanks={}; window.leaderData={};
  _cache.leaders.forEach((l,i)=>{window.leaderRanks[l.name]=i+1;window.leaderData[l.name]=l;});

  // Min-line leaders — pre-built here, not rebuilt in renderLeaders
  const ml={};
  P.forEach(p=>{
    if(!p.min_line||p.actualPts==null||!(p.result==='WIN'||p.result==='LOSS')||isLean(p)||isDNP(p)) return;
    if(!ml[p.player]) ml[p.player]={name:p.player,g:0,w:0};
    ml[p.player].g++; if(p.actualPts>p.min_line) ml[p.player].w++;
  });
  _cache.minLdrs=Object.values(ml).filter(x=>x.g>=5)
    .sort((a,b)=>(b.w/b.g)-(a.w/a.g)).slice(0,10);
}


// ─── SPARKLINE ───
function spark(d,ln,homes,w,h=40) {
  if(!d||d.length<2) return '';
  const isFullW=(w==null);
  const fixW=isFullW?360:w;
  const ds=d.slice(-20), hs=homes?homes.slice(-20):[];
  const n=ds.length,pad=6,top=5,bot=5, cw=fixW-pad*2,ch=h-top-bot;
  const mn=Math.min(...ds,ln)-1,mx=Math.max(...ds,ln)+1,rn=mx-mn||1;
  const x=i=>pad+(n<2?cw/2:(i/(n-1))*cw), y=v=>top+(1-(v-mn)/rn)*ch;
  const ly=y(ln);
  // Elegant palette
  const HIT='#f59e0b',MISS='#818cf8',HITR='245,158,11',MISSR='129,140,248';
  const LINE='rgba(255,255,255,0.25)';
  const svgParts=[];
  // Deterministic filter ID — resets each render() call, no Math.random per sparkline
  const uid = (_sparkUid++).toString(36);
  svgParts.push(`<defs>
    <filter id="gh${uid}"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gm${uid}"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>`);
  // Area fill
  const hitN=ds.filter(v=>v>ln).length,majority=hitN>=n/2,aRGB=majority?HITR:MISSR;
  let area=`M${x(0)},${ly}`;
  ds.forEach((v,i)=>{area+=` L${x(i)},${y(v)}`;});
  area+=` L${x(n-1)},${ly} Z`;
  svgParts.push(`<path d="${area}" fill="rgba(${aRGB},.10)" stroke="none"/>`);
  // Prop line
  svgParts.push(`<line x1="${pad}" y1="${ly}" x2="${pad+cw}" y2="${ly}" stroke="${LINE}" stroke-width="1" stroke-dasharray="4,3"/>`);
  // Connecting line
  const pts=ds.map((v,i)=>`${x(i)},${y(v)}`).join(' ');
  svgParts.push(`<polyline points="${pts}" fill="none" stroke="rgba(226,232,240,.15)" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round"/>`);
  // Dots — Fix 10: home/away as equal-sized text characters (⌂ / ✈)
  ds.forEach((v,i)=>{
    const cx=x(i),cy=y(v),hit=v>ln,fill=hit?HIT:MISS,gid=hit?`gh${uid}`:`gm${uid}`;
    const isMost=i===n-1,isHome=hs[i]===true,isAway=hs[i]===false;
    if(isMost){
      svgParts.push(`<circle cx="${cx}" cy="${cy}" r="6" fill="${fill}" filter="url(#${gid})" opacity=".2"/>`);
      svgParts.push(`<circle cx="${cx}" cy="${cy}" r="3.5" fill="${fill}"/>`);
    } else {
      svgParts.push(`<circle cx="${cx}" cy="${cy}" r="${hit?2.5:2}" fill="${fill}" opacity="${hit?.85:.6}"/>`);
    }
    // Fix 10: use text for both home and away so they render at the same size
    if(!isMost){
      if(isHome) svgParts.push(`<text x="${cx}" y="${cy-5}" text-anchor="middle" font-size="6" fill="rgba(96,165,250,0.55)">⌂</text>`);
      else if(isAway) svgParts.push(`<text x="${cx}" y="${cy-5}" text-anchor="middle" font-size="6" fill="rgba(148,163,184,0.4)">✈</text>`);
    }
  });
  const svgW=isFullW?'100%':w;
  return `<svg width="${svgW}" height="${h}" viewBox="0 0 ${fixW} ${h}" preserveAspectRatio="none" style="display:block;overflow:visible">${svgParts.join('')}</svg>`;
}

// ─── MAIN RENDER ───
function render() {
  _sparkUid = 0;  // reset deterministic sparkline ID counter
  const DS=_cache.DS, dates=_cache.dates;
  if(di<0) di=0; if(di>=dates.length) di=dates.length-1;
  const curDate=dates[di]||'';
  const {totalPlays,totalGraded,totalWins,
    totalApex,totalApexW,totalUltra,totalUltraW,
    totalElite,totalEliteW,totalStrong,totalStrongW,
    totalPlay,totalPlayW,totalSkip,totalSkipW,
    totalLeanG,totalLeanW} = _cache.totals;
  const seasonHR=totalGraded?(totalWins/totalGraded*100).toFixed(1):'0.0';
  const leanHR=totalLeanG?(totalLeanW/totalLeanG*100).toFixed(1):null;
  const _cdAll=P.filter(p=>p.date===curDate);
  const _cdGraded=_cdAll.filter(p=>p.result==='WIN'||p.result==='LOSS').length;
  const _cdActive=_cdAll.filter(p=>!isVoid(p)).length;
  const _cdStatus=_cdGraded>0&&_cdActive>0&&_cdGraded>=_cdActive*.8?'Completed':'Pre-Match';
  const _cdStatusC=_cdStatus==='Completed'?'var(--gr)':'var(--yl)';
  // Leaders — pre-built in _buildCache(), O(1) read here
  const _allLdrs = _cache.leaders;

  let h='';
  h+=`<div class="hdr"><div>
    <div class="hdr-t">PropEdge V16.0</div>
    <div class="hdr-s">${totalGraded.toLocaleString()} graded &middot; <span style="color:${hrc(+seasonHR)}">${seasonHR}% HR</span> &middot; ${totalLeanG?totalLeanG+' lean &middot; ':''}${curSeason} &middot; <span style="color:${_cdStatusC}">${_cdStatus}</span></div>
  </div><div class="logo">PE</div></div>`;
  h+=`<div class="season-toggle">
    <div class="season-btn ${curSeason==='2024-25'?'active':''}" onclick="loadSeason('2024-25')">2024-25</div>
    <div class="season-btn ${curSeason==='2025-26'?'active':''}" onclick="loadSeason('2025-26')">2025-26</div>
  </div>`;
  h+=`<div class="tabs">${['daily','season','leaders','stats'].map(t=>`<div class="tb ${tab===t?'on':''}" onclick="tab='${t}';render()">${t[0].toUpperCase()+t.slice(1)}</div>`).join('')}</div>`;

  // STRIP — per elite_tier HR stats, same definition as graded: non-lean, non-DNP WIN/LOSS
  // Strip stats — read from cache (pre-built in _buildCache, never recomputed on navigation)
  const {sApexG:_sApexG,sApexW:_sApexW,sUltraG:_sUltraG,sUltraW:_sUltraW,
         sEliteG:_sEliteG,sEliteW:_sEliteW,sStrongG:_sStrongG,sStrongW:_sStrongW,
         sPlayG:_sPlayG,sPlayW:_sPlayW} = _cache.strip;
  const _pct=(w,t)=>t?(w/t*100).toFixed(1)+'%':'—';
  const _wl=(w,t)=>t?w+'W/'+(t-w)+'L':'';
  const _stripItems=[
    {lbl:'Plays',   val:totalPlays.toLocaleString(), sub:'',                            clr:'var(--tx)'},
    {lbl:'Graded',  val:totalGraded.toLocaleString(),sub:totalWins+'W/'+(totalGraded-totalWins)+'L', clr:'var(--tx)'},
    {lbl:'HR',      val:seasonHR+'%',                sub:totalWins+'W/'+(totalGraded-totalWins)+'L', clr:hrc(+seasonHR)},
    {lbl:'APEX',    val:_pct(_sApexW,_sApexG.length),sub:_wl(_sApexW,_sApexG.length),  clr:'#34d399'},
    {lbl:'ULTRA',   val:_pct(_sUltraW,_sUltraG.length),sub:_wl(_sUltraW,_sUltraG.length),clr:'var(--yl)'},
    {lbl:'ELITE',   val:_pct(_sEliteW,_sEliteG.length),sub:_wl(_sEliteW,_sEliteG.length),clr:'var(--vi)'},
    {lbl:'STRONG',  val:_pct(_sStrongW,_sStrongG.length),sub:_wl(_sStrongW,_sStrongG.length),clr:'var(--bl)'},
    {lbl:'PLAY+',   val:_pct(_sPlayW,_sPlayG.length),sub:_wl(_sPlayW,_sPlayG.length),   clr:'#2dd4bf'},
  ];
  h+=`<div class="strip" style="padding:6px 8px;gap:0">${_stripItems.map((s,i,a)=>`<div class="si" style="flex:1;min-width:0"><div class="si-v" style="color:${s.clr};font-size:${s.lbl==='Plays'||s.lbl==='Graded'?'13px':'12px'}">${s.val}</div>${s.sub?`<div style="font:400 6px var(--M);color:var(--tx4);margin-top:1px;white-space:nowrap">${s.sub}</div>`:'<div style="height:8px"></div>'}<div class="si-l" style="font-size:7px;margin-top:1px">${s.lbl}</div></div>${i<a.length-1?'<div class="sdiv"></div>':''}`).join('')}</div>`;

  if(tab==='daily')   h+=renderDaily(DS,dates,curDate);
  else if(tab==='season')  h+=renderSeason(DS);
  else if(tab==='leaders') h+=renderLeaders(_allLdrs);
  else if(tab==='stats')   h+=renderStats(DS,totalPlays,totalGraded,totalWins,
    totalApex,totalApexW,totalUltra,totalUltraW,
    totalElite,totalEliteW,totalStrong,totalStrongW,
    totalPlay,totalPlayW,totalSkip,totalSkipW,totalLeanG,totalLeanW);

  h+=`<div class="ft"><strong style="color:var(--tx2)">PropEdge V16.0</strong> &middot; Elite Meta-Model &middot; APEX ≥81% (2.5u) &middot; ULTRA ≥78% (2u) &middot; ELITE ≥75% (2u) &middot; STRONG ≥72% (1.5u) &middot; PLAY+ ≥68% (1.2u) &middot; ${curSeason}</div>`;
  document.getElementById('app').innerHTML=h;
}

// ─── DAILY TAB ───
function renderDaily(DS,dates,curDate) {
  let h='';
  const months=[...new Set(dates.map(d=>d.slice(0,7)))].sort();
  h+=`<div class="mscr">${months.map(m=>{const[y,mo]=m.split('-');const lbl=new Date(+y,+mo-1,1).toLocaleDateString('en-US',{month:'short'});return`<div class="mon ${selMon===m?'on':''}" onclick="selMon='${m}';jumpToMonth('${m}');render()">${lbl}</div>`;}).join('')}</div>`;

  const calDs=DS.filter(d=>d.date.startsWith(selMon)).slice(-7);
  h+=`<div style="display:flex;align-items:center;gap:4px;margin-bottom:4px">
    <div class="mon" style="padding:4px 8px;font-size:11px;flex-shrink:0;${di<=0?'opacity:.35;cursor:default':'cursor:pointer'}" onclick="if(di>0){di--;selMon=dates[di].slice(0,7);fMatch='all';render()}">&#9664;</div>
    <div class="dcal" style="flex:1">`;
  calDs.forEach(d=>{
    const dObj=new Date(d.date+'T12:00:00');
    const dow=dObj.toLocaleDateString('en-US',{weekday:'short'}).toUpperCase().slice(0,3);
    const dom=dObj.getDate(), isAct=d.date===curDate;
    const hr=d.graded?d.wins/d.graded:0;
    const wlC=d.graded?(hr>=.55?'var(--gr)':hr>=.45?'var(--yl)':'var(--rd)'):'var(--tx4)';
    const dIdx=dates.indexOf(d.date);
    h+=`<div class="dday ${isAct?'on':''}" onclick="if(${dIdx}>=0){di=${dIdx};selMon='${d.date.slice(0,7)}';fMatch='all';render()}">
      <div class="dow">${dow}</div><div class="dnum">${dom}</div>
      <div class="dwl" style="color:${wlC}">${d.graded?d.wins+'W/'+(d.graded-d.wins)+'L':d.plays?'<span style="color:var(--bl);font-size:6px">'+d.plays+'&#9658;</span>':'&mdash;'}</div>
    </div>`;
  });
  h+=`</div>
    <div class="mon" style="padding:4px 8px;font-size:11px;flex-shrink:0;${di>=dates.length-1?'opacity:.35;cursor:default':'cursor:pointer'}" onclick="if(di<dates.length-1){di++;selMon=dates[di].slice(0,7);fMatch='all';render()}">&#9654;</div>
  </div>`;

  const dayAll=P.filter(p=>p.date===curDate);
  const voids=dayAll.filter(p=>isVoid(p));
  const valid=dayAll.filter(p=>!isVoid(p));

  // Graded = APEX+ULTRA+ELITE+STRONG+PLAY+ WIN/LOSS only (non-lean, non-DNP)
  // SKIP shown separately with its own accuracy — does NOT contribute to graded HR
  const _gradedTiers = new Set(['APEX','ULTRA','ELITE','STRONG','PLAY+']);
  const dayDNP     = valid.filter(p=>isDNP(p));
  const dayLean    = valid.filter(p=>isLean(p)&&!isDNP(p));
  const dayGraded  = valid.filter(p=>(p.result==='WIN'||p.result==='LOSS')&&_gradedTiers.has(p.elite_tier)&&!isLean(p)&&!isDNP(p));
  const dayPending = valid.filter(p=>!isDNP(p)&&!isLean(p)&&p.result!=='WIN'&&p.result!=='LOSS');
  const dayWins    = dayGraded.filter(p=>p.result==='WIN').length;
  const leanGraded = dayLean.filter(p=>p.result==='WIN'||p.result==='LOSS');
  const leanWins   = leanGraded.filter(p=>p.result==='WIN').length;
  const gm=[...new Set(valid.map(p=>p.match))];
  const isPreGame  = dayGraded.length===0&&valid.length>0;

  // ══════════════════════════════════════════════════════════════════
  // TIER BUCKETING — elite_tier is ALWAYS present in data (verified).
  // NO tier-number fallback. Removing it was the critical fix:
  //   Data reality: PLAY+ plays have tier=2, SKIP plays have tier=3
  //   Old fallback || tier===2 was pulling ALL PLAY+ into STRONG
  //   Old fallback || tier===3 was pulling ALL SKIP into PLAY+
  //
  // LEAN is NOT a separate tier — it is a sub-direction within STRONG/PLAY+/SKIP.
  // A LEAN OVER/UNDER play still belongs to its elite_tier bucket for counting.
  // LEAN plays ARE excluded from graded HR stats (they're tracked separately).
  //
  // Accounting: APEX+ULTRA+ELITE+STRONG+PLAY++SKIP = valid.length (always exact)
  // DNP and Pending are subsets within the above tiers, not separate buckets.
  // ══════════════════════════════════════════════════════════════════
  const _apex   = valid.filter(p => p.elite_tier==='APEX');
  const _ultra  = valid.filter(p => p.elite_tier==='ULTRA');
  const _t1     = valid.filter(p => p.elite_tier==='ELITE');
  const _t2     = valid.filter(p => p.elite_tier==='STRONG');
  const _t3     = valid.filter(p => p.elite_tier==='PLAY+');
  const _skipP  = valid.filter(p => p.elite_tier==='SKIP');
  // _prem kept as alias for ULTRA for sub-table compat
  const _prem = _ultra;

  // ── CONTROL CHECK ─────────────────────────────────────────────────
  // All 6 buckets must sum exactly to valid.length
  const _ccSum = _apex.length+_ultra.length+_t1.length+_t2.length+_t3.length+_skipP.length;
  const _ccOk  = _ccSum === valid.length;
  const _ccDiff= _ccSum - valid.length;

  // ── GRADED SUBSETS ────────────────────────────────────────────────
  // Graded = WIN/LOSS, NOT lean, NOT DNP. Lean plays stay in their tier bucket for
  // total-count display but are excluded from all HR/accuracy calculations.
  const _uG  = _apex.filter(p=>(p.result==='WIN'||p.result==='LOSS')&&!isLean(p)),  _uW =_uG.filter(p=>p.result==='WIN').length;
  const _pG  = _ultra.filter(p=>(p.result==='WIN'||p.result==='LOSS')&&!isLean(p)), _pW =_pG.filter(p=>p.result==='WIN').length;
  const _tG  = _t1.filter(p=>(p.result==='WIN'||p.result==='LOSS')&&!isLean(p)),    _tW =_tG.filter(p=>p.result==='WIN').length;
  const _t2G = _t2.filter(p=>(p.result==='WIN'||p.result==='LOSS')&&!isLean(p)),    _t2W=_t2G.filter(p=>p.result==='WIN').length;
  const _t3G = _t3.filter(p=>(p.result==='WIN'||p.result==='LOSS')&&!isLean(p)),    _t3W=_t3G.filter(p=>p.result==='WIN').length;
  const _skG = _skipP.filter(p=>(p.result==='WIN'||p.result==='LOSS')&&!isLean(p)), _skW=_skG.filter(p=>p.result==='WIN').length;

  // APEX+ULTRA+ELITE combined for completed day box
  const _t1total=[..._uG,..._pG,..._tG], _t1W=_t1total.filter(p=>p.result==='WIN').length;

  // HR helpers
  function _hrC(w,t){return t&&w/t>=.55?'var(--gr)':t&&w/t<.5?'var(--rd)':'var(--yl)';}
  function _hrPct(w,t){return t?(w/t*100).toFixed(0)+'%':'—';}

  const _gradedHR  = _hrPct(dayWins,dayGraded.length);
  const _gradedHRc = _hrC(dayWins,dayGraded.length);
  const _t1HR  = _hrPct(_t1W,_t1total.length);
  const _t1HRc = _hrC(_t1W,_t1total.length);
  const _t2HR  = _hrPct(_t2W,_t2G.length);
  const _t2HRc = _hrC(_t2W,_t2G.length);
  const _t3HR  = _hrPct(_t3W,_t3G.length);
  const _t3HRc = _hrC(_t3W,_t3G.length);

  // O/U breakdowns (for pre-match: all plays in bucket; for completed: graded subset)
  const _uO=_apex.filter(p=>p.dir==='OVER').length,   _uU=_apex.filter(p=>p.dir==='UNDER').length;
  const _pO=_ultra.filter(p=>p.dir==='OVER').length,  _pU=_ultra.filter(p=>p.dir==='UNDER').length;
  const _tO=_t1.filter(p=>p.dir==='OVER').length,     _tU=_t1.filter(p=>p.dir==='UNDER').length;
  const _t2O=_t2.filter(p=>p.dir==='OVER').length,    _t2U=_t2.filter(p=>p.dir==='UNDER').length;
  const _t3O=_t3.filter(p=>p.dir==='OVER').length,    _t3U=_t3.filter(p=>p.dir==='UNDER').length;
  const _t2oG=_t2G.filter(p=>p.dir==='OVER'), _t2oW=_t2oG.filter(p=>p.result==='WIN').length;
  const _t2uG=_t2G.filter(p=>p.dir==='UNDER'),_t2uW=_t2uG.filter(p=>p.result==='WIN').length;
  const _t3oG=_t3G.filter(p=>p.dir==='OVER'), _t3oW=_t3oG.filter(p=>p.result==='WIN').length;
  const _t3uG=_t3G.filter(p=>p.dir==='UNDER'),_t3uW=_t3uG.filter(p=>p.result==='WIN').length;

  // APEX/ULTRA/ELITE sub-tables
  function _t1TablePre(){
    return '<table class="t1tbl">'
      +'<tr><td class="tc0"></td><td class="tc1" style="color:var(--ov);font-size:6px;font-weight:600">OVER</td><td class="tc2" style="color:var(--un);font-size:6px;font-weight:600">UNDER</td></tr>'
      +'<tr onclick="event.stopPropagation();fTier=\'apex\';render()"><td class="tc0"><span class="chip-u">APEX</span></td><td class="tc1" style="color:var(--ov)">'+_uO+'</td><td class="tc2" style="color:var(--un)">'+_uU+'</td></tr>'
      +'<tr onclick="event.stopPropagation();fTier=\'ultra\';render()"><td class="tc0"><span class="chip-p">ULTRA</span></td><td class="tc1" style="color:var(--ov)">'+_pO+'</td><td class="tc2" style="color:var(--un)">'+_pU+'</td></tr>'
      +'<tr onclick="event.stopPropagation();fTier=\'elite\';render()"><td class="tc0"><span class="chip-t">ELITE</span></td><td class="tc1" style="color:var(--ov)">'+_tO+'</td><td class="tc2" style="color:var(--un)">'+_tU+'</td></tr>'
      +'</table>';
  }
  function _t1TableDone(){
    return '<table class="t1tbl">'
      +'<tr><td class="tc0"></td><td class="tc1" style="color:var(--tx4);font-size:6px;font-weight:600">HR</td><td class="tc2" style="color:var(--tx4);font-size:6px;font-weight:600">W/L</td></tr>'
      +'<tr onclick="event.stopPropagation();fTier=\'apex\';render()"><td class="tc0"><span class="chip-u">APEX</span></td><td class="tc1" style="color:'+_hrC(_uW,_uG.length)+'">'+_hrPct(_uW,_uG.length)+'</td><td class="tc2" style="color:var(--tx3)">'+_uW+'/'+(_uG.length-_uW)+'</td></tr>'
      +'<tr onclick="event.stopPropagation();fTier=\'ultra\';render()"><td class="tc0"><span class="chip-p">ULTRA</span></td><td class="tc1" style="color:'+_hrC(_pW,_pG.length)+'">'+_hrPct(_pW,_pG.length)+'</td><td class="tc2" style="color:var(--tx3)">'+_pW+'/'+(_pG.length-_pW)+'</td></tr>'
      +'<tr onclick="event.stopPropagation();fTier=\'elite\';render()"><td class="tc0"><span class="chip-t">ELITE</span></td><td class="tc1" style="color:'+_hrC(_tW,_tG.length)+'">'+_hrPct(_tW,_tG.length)+'</td><td class="tc2" style="color:var(--tx3)">'+_tW+'/'+(_tG.length-_tW)+'</td></tr>'
      +'</table>';
  }

  // ── CONTROL CHECK BANNER ──────────────────────────────────────────
  if(!_ccOk){
    h+=`<div style="display:flex;align-items:center;gap:6px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.4);border-radius:8px;padding:7px 10px;margin-bottom:8px">
      <span style="font:700 10px var(--M);color:var(--rd)">⚠ TIER MISMATCH</span>
      <span style="font:400 9px var(--S);color:var(--tx2)">
        Bucketed <strong style="color:var(--rd)">${_ccSum}</strong> of <strong>${valid.length}</strong> props
        — <strong style="color:var(--rd)">${Math.abs(_ccDiff)}</strong> ${_ccDiff>0?'over-counted':'unclassified (missing elite_tier)'}.
      </span>
    </div>`;
  }

  // ── PRE-MATCH SUMMARY ─────────────────────────────────────────────
  if(isPreGame){
    h+='<div class="sum-row sum-pre">';
    h+='<div class="sb2'+(fTier==='all'&&fDir==='all'&&fRes==='all'?' sb2-on':'')+'" style="cursor:pointer" onclick="fTier=\'all\';fDir=\'all\';fRes=\'all\';fMatch=\'all\';render()">'
     +'<div class="sb2-v">'+valid.length+'</div><div class="sb2-l">Props</div><div class="sb2-wl">'+gm.length+' games</div></div>';
    h+='<div class="t1box'+(fTier==='apex'||fTier==='ultra'||fTier==='elite'?' t1-on':'')+'" onclick="fTier=fTier===\'apex\'?\'all\':\'apex\';render()">'
     +'<div class="t1box-v">'+(_apex.length+_ultra.length+_t1.length)+'</div>'
     +'<div class="t1box-l" style="font-size:7px;letter-spacing:.3px">APEX / ULTRA / ELITE</div>'
     +_t1TablePre()+'</div>';
    h+='<div class="sb2'+(fTier==='strong'?' sb2-on':'')+'" style="cursor:pointer" onclick="fTier=fTier===\'strong\'?\'all\':\'strong\';render()">'
     +'<div class="sb2-v" style="color:var(--bl)">'+_t2.length+'</div><div class="sb2-l">STRONG</div><div class="sb2-sep"></div>'
     +'<div class="sb2-ou"><div style="color:var(--ov)">O &middot; '+_t2O+'</div><div style="color:var(--un)">U &middot; '+_t2U+'</div></div></div>';
    h+='<div class="sb2'+(fTier==='play+'?' sb2-on':'')+'" style="cursor:pointer" onclick="fTier=fTier===\'play+\'?\'all\':\'play+\';render()">'
     +'<div class="sb2-v" style="color:#2dd4bf">'+_t3.length+'</div><div class="sb2-l">PLAY+</div><div class="sb2-sep"></div>'
     +'<div class="sb2-ou"><div style="color:var(--ov)">O &middot; '+_t3O+'</div><div style="color:var(--un)">U &middot; '+_t3U+'</div></div></div>';
    // SKIP — show Lean Over / Lean Under sub-counts
    const _skipLO=_skipP.filter(p=>p.dir==='LEAN OVER').length, _skipLU=_skipP.filter(p=>p.dir==='LEAN UNDER').length;
    h+='<div class="sb2" style="opacity:.6;cursor:default">'
     +'<div class="sb2-v" style="color:var(--tx3)">'+_skipP.length+'</div><div class="sb2-l">SKIP</div><div class="sb2-sep"></div>'
     +'<div class="sb2-ou" style="font-size:6px"><div style="color:var(--ov)">L↑&nbsp;'+_skipLO+'</div><div style="color:var(--un)">L↓&nbsp;'+_skipLU+'</div></div></div>';
    h+='</div>';

  // ── COMPLETED DAY SUMMARY ─────────────────────────────────────────
  } else {
    h+='<div class="sum-row sum-done">';
    h+='<div class="sb2'+(fTier==='all'&&fDir==='all'&&fRes==='all'?' sb2-on':'')+'" style="cursor:pointer" onclick="fTier=\'all\';fDir=\'all\';fRes=\'all\';fMatch=\'all\';render()">'
     +'<div class="sb2-v">'+valid.length+'</div><div class="sb2-l">Props</div><div class="sb2-wl">'+gm.length+' games</div></div>';
    h+='<div class="sb2'+(fRes==='graded'&&fDir==='all'?' sb2-on':'')+'" style="cursor:pointer" onclick="fRes=fRes===\'graded\'?\'all\':\'graded\';fDir=\'all\';render()">'
     +'<div class="sb2-v" style="color:'+_gradedHRc+'">'+dayGraded.length+'</div><div class="sb2-l">Graded</div>'
     +'<div class="sb2-hr" style="color:'+_gradedHRc+'">'+_gradedHR+'</div><div class="sb2-wl">'+dayWins+'W / '+(dayGraded.length-dayWins)+'L</div></div>';
    // APEX+ULTRA+ELITE: headline = TOTAL plays in these tiers (for Props accounting)
    // Secondary = graded W/L/HR (accuracy only on settled plays)
    const _t1TotalAll = _apex.length+_ultra.length+_t1.length;
    h+='<div class="t1box'+(fTier==='apex'||fTier==='ultra'||fTier==='elite'?' t1-on':'')+'" onclick="fTier=fTier===\'apex\'?\'all\':\'apex\';render()">'
     +'<div class="t1box-v">'+_t1TotalAll+'</div>'
     +'<div class="t1box-l" style="font-size:7px;letter-spacing:.3px">APEX+ULTRA+ELITE</div>'
     +'<div style="font:700 10px var(--M);color:var(--yl);margin:2px 0 1px">'+_t1HR+'</div>'
     +'<div style="font:500 7px var(--M);color:var(--tx3)">'+_t1W+'W / '+(_t1total.length-_t1W)+'L <span style="color:var(--tx4)">('+_t1total.length+' graded)</span></div>'
     +_t1TableDone()+'</div>';
    // STRONG: headline = total STRONG plays, secondary = graded HR
    h+='<div class="sb2'+(fTier==='strong'?' sb2-on':'')+'" style="cursor:pointer" onclick="fTier=fTier===\'strong\'?\'all\':\'strong\';render()">'
     +'<div class="sb2-v" style="color:var(--bl)">'+_t2.length+'</div><div class="sb2-l">STRONG</div>'
     +'<div class="sb2-hr" style="color:'+_t2HRc+'">'+_t2HR+'</div><div class="sb2-wl">'+_t2W+'W / '+(_t2G.length-_t2W)+'L <span style="color:var(--tx4)">('+_t2G.length+'g)</span></div><div class="sb2-sep"></div>'
     +'<div class="sb2-ou"><div style="color:var(--ov)">O '+_hrPct(_t2oW,_t2oG.length)+' <span style="font:400 6px var(--M);color:var(--tx4)">'+_t2oW+'/'+_t2oG.length+'</span></div>'
     +'<div style="color:var(--un)">U '+_hrPct(_t2uW,_t2uG.length)+' <span style="font:400 6px var(--M);color:var(--tx4)">'+_t2uW+'/'+_t2uG.length+'</span></div></div></div>';
    // PLAY+: headline = total PLAY+ plays, secondary = graded HR
    h+='<div class="sb2'+(fTier==='play+'?' sb2-on':'')+'" style="cursor:pointer" onclick="fTier=fTier===\'play+\'?\'all\':\'play+\';render()">'
     +'<div class="sb2-v" style="color:#2dd4bf">'+_t3.length+'</div><div class="sb2-l">PLAY+</div>'
     +'<div class="sb2-hr" style="color:'+_t3HRc+'">'+_t3HR+'</div><div class="sb2-wl">'+_t3W+'W / '+(_t3G.length-_t3W)+'L <span style="color:var(--tx4)">('+_t3G.length+'g)</span></div><div class="sb2-sep"></div>'
     +'<div class="sb2-ou"><div style="color:var(--ov)">O '+_hrPct(_t3oW,_t3oG.length)+' <span style="font:400 6px var(--M);color:var(--tx4)">'+_t3oW+'/'+_t3oG.length+'</span></div>'
     +'<div style="color:var(--un)">U '+_hrPct(_t3uW,_t3uG.length)+' <span style="font:400 6px var(--M);color:var(--tx4)">'+_t3uW+'/'+_t3uG.length+'</span></div></div></div>';
    // SKIP: headline = total SKIP plays (all 10, incl lean), accuracy on non-lean graded only
    const _skipLOc=_skipP.filter(p=>p.dir==='LEAN OVER').length, _skipLUc=_skipP.filter(p=>p.dir==='LEAN UNDER').length;
    const _skGW2=_skG.filter(p=>p.result==='WIN').length, _skHR2=_hrPct(_skGW2,_skG.length), _skHRc2=_hrC(_skGW2,_skG.length);
    h+='<div class="sb2'+(fTier==='skip'?' sb2-on':'')+'" style="cursor:pointer" onclick="fTier=fTier===\'skip\'?\'all\':\'skip\';render()">'
     +'<div class="sb2-v" style="color:var(--tx3)">'+_skipP.length+'</div><div class="sb2-l">SKIP</div>'
     +'<div class="sb2-hr" style="color:'+_skHRc2+'">'+_skHR2+'</div><div class="sb2-wl">'+_skGW2+'W / '+(_skG.length-_skGW2)+'L <span style="color:var(--tx4)">('+_skG.length+'g)</span></div><div class="sb2-sep"></div>'
     +'<div class="sb2-ou" style="font-size:6px"><div style="color:var(--ov)">L↑&nbsp;'+_skipLOc+'</div><div style="color:var(--un)">L↓&nbsp;'+_skipLUc+'</div></div></div>';
    h+='<div class="sb2'+(fRes==='dnp'?' sb2-on':'')+'" style="cursor:pointer" onclick="fRes=fRes===\'dnp\'?\'all\':\'dnp\';render()">'
     +'<div class="sb2-v" style="color:var(--yl)">'+dayDNP.length+'</div><div class="sb2-l">DNP</div></div>';
    h+='</div>';
  }

  // ── GAME DROPDOWN ─────────────────────────────────────────────────
  const matchMap={};
  valid.forEach(p=>{if(!matchMap[p.match]||p.gameTime<matchMap[p.match])matchMap[p.match]=p.gameTime;});
  function _tMin(s){if(!s)return 9999;const m=s.match(/(\d+):(\d+)\s*(AM|PM)/i);if(!m)return 9999;let h=+m[1],n=+m[2];if(m[3].toUpperCase()==='PM'&&h!==12)h+=12;if(m[3].toUpperCase()==='AM'&&h===12)h=0;return h*60+n;}
  const sortedM=Object.entries(matchMap).sort((a,b)=>{const d=_tMin(a[1])-_tMin(b[1]);return d!==0?d:a[0].localeCompare(b[0]);});

  // ── FILTER BAR ────────────────────────────────────────────────────
  h+=`<div class="fbar"><div class="frow">`;
  [['all','All','abl'],['over','O','abl'],['under','U','abl'],['lean','Lean','abl']].forEach(([k,l,c])=>{
    h+=`<div class="fp ${fDir===k?c:''}" onclick="fDir='${k}';render()">${l}</div>`;
  });
  h+=`<div class="fdiv"></div>`;
  [['all','All','agr'],['w','W','agr'],['l','L','ard'],['graded','Graded','abl'],['dnp','DNP','ayl']].forEach(([k,l,c])=>{
    h+=`<div class="fp ${fRes===k?c:''}" onclick="fRes='${k}';render()">${l}</div>`;
  });
  h+=`<div class="fdiv"></div>`;
  [['all','All','ayl'],['apex','APEX','agr'],['ultra','ULTRA','ayl'],['elite','ELITE','abl'],['strong','STRONG','abl'],['play+','PLAY+','abl'],['skip','SKIP','abl']].forEach(([k,l,c])=>{
    h+=`<div class="fp ${fTier===k?c:''}" onclick="fTier='${k}';render()">${l}</div>`;
  });
  h+=`<div class="fdiv"></div>`;
  h+=`<div class="fp ${fDir!=='all'||fRes!=='all'||fTier!=='all'||fMatch!=='all'||fConf>0?'ard':''}" onclick="fDir='all';fRes='all';fTier='all';fMatch='all';fConf=0;fSearch='';render()" title="Clear filters">✕</div>`;
  h+=`</div><div class="frow">
    <select class="fsel" style="flex:2;max-width:none" onchange="fMatch=this.value;render()">
      <option value="all">All Games</option>
      ${sortedM.map(([m,t])=>`<option value="${m.replace(/"/g,'')}" ${fMatch===m?'selected':''}>${t?t+' &middot; ':''}${m}</option>`).join('')}
    </select>
    <input type="search" placeholder="Search..." value="${fSearch}"
      onkeydown="if(event.key==='Enter'){fSearch=this.value;render()}"
      oninput="if(this.value===''){fSearch='';render()}"
      style="flex:1;min-width:80px;max-width:140px;padding:5px 9px;border-radius:8px;border:1px solid var(--bg2);background:var(--bg1);color:var(--tx);font:400 11px var(--S);outline:none"/>
    <select class="fsel" onchange="fConf=+this.value;render()">
      <option value="0" ${fConf===0?'selected':''}>Any Conf</option>
      <option value="68" ${fConf===68?'selected':''}>PLAY+ (≥68%)</option>
      <option value="72" ${fConf===72?'selected':''}>STRONG (≥72%)</option>
      <option value="75" ${fConf===75?'selected':''}>ELITE (≥75%)</option>
      <option value="78" ${fConf===78?'selected':''}>ULTRA (≥78%)</option>
    </select>
    <select class="fsel" onchange="srt=this.value;render()">
      <option value="def"    ${srt==='def'   ?'selected':''}>Elite+Conf</option>
      <option value="elite"  ${srt==='elite' ?'selected':''}>Elite Prob ↓</option>
      <option value="conf"   ${srt==='conf'  ?'selected':''}>Conf ↓</option>
      <option value="pred"   ${srt==='pred'  ?'selected':''}>Pred Gap ↓</option>
      <option value="time"   ${srt==='time'  ?'selected':''}>Game Time</option>
      <option value="name"   ${srt==='name'  ?'selected':''}>Player A-Z</option>
      <option value="line"   ${srt==='line'  ?'selected':''}>Prop Line ↓</option>
      <option value="result" ${srt==='result'?'selected':''}>Result</option>
      <option value="odds"   ${srt==='odds'  ?'selected':''}>Odds (Dec) ↓</option>
    </select>
  </div></div>`;

  // ── APPLY FILTERS ─────────────────────────────────────────────────
  const _searchLower=fSearch.trim().toLowerCase();
  let fl=fRes==='void'?dayAll.filter(p=>isVoid(p)):fRes==='dnp'?valid.filter(p=>isDNP(p)):[...valid];
  if(fDir==='over')   fl=fl.filter(p=>p.dir==='OVER');
  if(fDir==='under')  fl=fl.filter(p=>p.dir==='UNDER');
  if(fDir==='lean')   fl=fl.filter(p=>isLean(p));
  if(fRes==='w')      fl=fl.filter(p=>p.result==='WIN');
  if(fRes==='l')      fl=fl.filter(p=>p.result==='LOSS');
  if(fRes==='graded') fl=fl.filter(p=>(p.result==='WIN'||p.result==='LOSS')&&!isLean(p)&&!isDNP(p));
  // Tier filters — elite_tier ONLY, no tier-number fallback
  if     (fTier==='apex')   fl=fl.filter(p=>p.elite_tier==='APEX');
  else if(fTier==='ultra')  fl=fl.filter(p=>p.elite_tier==='ULTRA');
  else if(fTier==='elite')  fl=fl.filter(p=>p.elite_tier==='ELITE');
  else if(fTier==='strong') fl=fl.filter(p=>p.elite_tier==='STRONG');
  else if(fTier==='play+')  fl=fl.filter(p=>p.elite_tier==='PLAY+');
  else if(fTier==='skip')   fl=fl.filter(p=>p.elite_tier==='SKIP');
  if(fMatch!=='all') fl=fl.filter(p=>p.match===fMatch);
  if(fConf>0)        fl=fl.filter(p=>(p.elite_prob||p.conf||0)>=fConf/100);
  if(_searchLower)   fl=fl.filter(p=>p.player.toLowerCase().includes(_searchLower)||(p.match||'').toLowerCase().includes(_searchLower));

  // SORT
  if(srt==='elite')  fl.sort((a,b)=>(b.elite_prob||0)-(a.elite_prob||0));
  else if(srt==='conf')   fl.sort((a,b)=>b.conf-a.conf);
  else if(srt==='pred')   fl.sort((a,b)=>(b.predGap||0)-(a.predGap||0));
  else if(srt==='time')   fl.sort((a,b)=>_tMin(a.gameTime)-_tMin(b.gameTime)||a.match.localeCompare(b.match));
  else if(srt==='name')   fl.sort((a,b)=>a.player.localeCompare(b.player));
  else if(srt==='line')   fl.sort((a,b)=>(b.line||0)-(a.line||0));
  else if(srt==='result') fl.sort((a,b)=>{const ro={WIN:0,LOSS:1};return(ro[a.result]??2)-(ro[b.result]??2)||b.conf-a.conf;});
  else if(srt==='odds'){fl.sort((a,b)=>{const ao=parseFloat((a.dir==='OVER'||a.dir==='LEAN OVER'?a.overOdds:a.underOdds)||0),bo=parseFloat((b.dir==='OVER'||b.dir==='LEAN OVER'?b.overOdds:b.underOdds)||0);return bo-ao;});}
  else fl.sort((a,b)=>(b.date||'').localeCompare(a.date||'')||a.tier-b.tier||(b.elite_prob||0)-(a.elite_prob||0)||b.conf-a.conf);

  const dLbl=curDate?new Date(curDate+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}):'';
  const _fcLean=fl.filter(p=>isLean(p)&&!isDNP(p)).length;
  const _fcDNP2=fl.filter(p=>isDNP(p)).length;
  const _fcCore=fl.filter(p=>(p.result==='WIN'||p.result==='LOSS')&&!isLean(p)&&!isDNP(p)).length;
  const _fcPend=fl.filter(p=>!isDNP(p)&&!isLean(p)&&p.result!=='WIN'&&p.result!=='LOSS').length;
  h+=`<div class="pcount">${fl.length} shown · ${_fcCore} graded · ${_fcLean} lean · ${_fcDNP2} DNP${_fcPend?' · '+_fcPend+' pending':''}${isPreGame?' · <span style="color:var(--bl)">Pre-game</span>':''} · Tap to expand</div>`;
  if(!fl.length) h+=`<div class="ld">No plays match filters</div>`;
  else fl.forEach(p=>{h+=card(p);});
  return h;
}

// ─── PLAY CARD ───
function card(p) {
  const dirOver=p.dir==='OVER'||p.dir==='LEAN OVER';
  const dirUnder=p.dir==='UNDER'||p.dir==='LEAN UNDER';
  const bdr=dirOver?'og':dirUnder?'ug':'';
  const lean=isLean(p);
  const dBg=dirOver?'var(--ovA)':dirUnder?'var(--unA)':'rgba(148,163,184,.12)';
  const dC=dirOver?'var(--ov)':dirUnder?'var(--un)':'var(--tx2)';
  const dl=p.dir==='NO PLAY'?(p.rawDir||'—'):p.dir;
  const k=p.player+'_'+p.date+'_'+p.line;
  const o=exp.has(k);
  const flagC=(p.flags||0)>=8?'var(--gr)':(p.flags||0)>=6?'var(--yl)':'var(--rd)';
  const void_=isVoid(p);

  let h=`<div class="cd ${bdr} ${void_?'vd':''} ${isDNP(p)?'vd':''} ${lean?'lean':''}" onclick="tgl('${k.replace(/'/g,"\\'")}')">`;

  // TOP ROW
  const homeIcon=p.isHome===true?'<span style="font-size:14px;line-height:1">🏠</span>':p.isHome===false?'<span style="font-size:14px;line-height:1">✈️</span>':'';
  const _rk=window.leaderRanks&&window.leaderRanks[p.player];
  const _rkBadge=_rk&&_rk<=25?'<span style="font:700 7px var(--M);padding:1px 4px;border-radius:4px;background:'+(_rk<=10?'rgba(251,191,36,.25)':'rgba(148,163,184,.12)')+';color:'+(_rk<=10?'var(--yl)':'var(--tx3)')+'\">#'+_rk+'</span>':'';
  // V14: engine split badge
  const engBadge=p.enginesAgree===false?'<span style="font:700 7px var(--M);padding:1px 5px;border-radius:4px;background:rgba(239,68,68,.12);color:var(--rd)">CLF-SPLIT</span>':'';

  h+=`<div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
        <span style="font:700 8px var(--M);padding:1px 6px;border-radius:6px;background:${dBg};color:${dC}">${dl}</span>
        <span style="font:600 13px var(--S)">${p.player}</span>
        ${(()=>{const tm=p.team&&p.team!=='undefined'&&p.team!==''&&p.team!=='MISSING'?p.team:(p.away&&p.home?(p.isHome?p.home:p.away):null);return tm?`<span style="font:700 8px var(--M);padding:1px 5px;border-radius:4px;background:rgba(56,189,248,.1);color:var(--bl)">${tm}</span>`:'';})()} ${homeIcon} ${_rkBadge} ${tierBadge(p)}
        <span style="font:700 8px var(--M);padding:2px 5px;border-radius:4px;background:rgba(56,189,248,.07);color:${flagC}">${p.flagsStr||'—'}</span>
        ${engBadge}
        ${p.avail&&p.avail!=='OK'?`<span style="font:600 7px var(--M);padding:2px 5px;border-radius:4px;background:var(--rdA);color:var(--rd)">${p.avail}</span>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:2px">
        <span style="font:400 9px var(--S);color:var(--tx2)">${p.match}${p.gameTime?' &middot; '+p.gameTime:''}</span>
        ${posLabel(p)?`<span style="font:400 8px var(--S);color:var(--tx3)">${posLabel(p)}</span>`:''}
        <span style="font:400 9px var(--S);color:var(--tx3)">${Math.round(p.conf*100)}% conf</span>${p.elite_prob!=null?`<span style="font:700 8px var(--M);padding:1px 5px;border-radius:4px;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);color:${p.elite_prob>=0.78?'#34d399':p.elite_prob>=0.72?'var(--bl)':'#2dd4bf'}">Elite ${(p.elite_prob*100).toFixed(0)}%</span>`:''}
        ${p.predPts!=null?`<span style="font:500 8px var(--M);padding:1px 5px;border-radius:4px;background:rgba(99,102,241,.1);color:var(--accent)">Pred: ${p.predPts.toFixed(1)} pts</span>`:''}
        ${p.predGap!=null?`<span style="font:500 7px var(--M);color:${p.predGap>=3?'var(--gr)':p.predGap>=1.5?'var(--yl)':'var(--tx3)'}">gap: ${p.predGap.toFixed(1)}</span>`:''}
      </div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;margin-left:8px;flex-shrink:0">`;

  if(isDNP(p)){h+=`<span style="font:700 9px var(--M);padding:3px 8px;border-radius:5px;background:rgba(245,158,11,.15);color:var(--yl);border:1px solid rgba(245,158,11,.35)">DNP</span>`;}
  else if(void_){h+=`<span style="font:700 9px var(--M);padding:2px 7px;border-radius:5px;background:var(--bg2);color:var(--tx4)">VOID</span>`;}
  else if(p.result==='WIN'){h+=`<span style="font:800 11px var(--M);padding:4px 11px;border-radius:7px;background:var(--grA);color:var(--gr);letter-spacing:.5px">WIN</span>`;if(p.delta!=null)h+=`<span style="font:500 9px var(--M);color:var(--gr)">${p.delta>0?'+':''}${p.delta}</span>`;}
  else if(p.result==='LOSS'){h+=`<span style="font:800 11px var(--M);padding:4px 11px;border-radius:7px;background:var(--rdA);color:var(--rd);letter-spacing:.5px">LOSS</span>`;if(p.delta!=null)h+=`<span style="font:500 9px var(--M);color:var(--rd)">${p.delta>0?'+':''}${p.delta}</span>`;}
  else{h+=`<span style="font:600 9px var(--M);color:var(--tx3)">${p.units}u</span>`;}
  if(p.actualPts!=null)h+=`<span style="font:400 9px var(--M);color:var(--tx2)">${Math.round(p.actualPts)} pts</span>`;
  h+=`</div></div>`;

  // STATS + SPARKLINE ROW — Fix 6: show line change arrow; Fix 5: sparkline responsive
  const lhArr=p.lineHistory;
  const _amToDec=am=>{const n=parseFloat(am);if(!n||isNaN(n))return null;return n>0?(+(n/100+1).toFixed(2)):(+(100/Math.abs(n)+1).toFixed(2));};
  const _rawOdds=dirOver?p.overOdds:p.underOdds;
  const _decOdds=_amToDec(_rawOdds);
  const _oddsDisp=_decOdds!=null?_decOdds.toFixed(2):(_rawOdds||'—');
  // Line display: value + inline arrow + delta magnitude
  const _lineDelta=(()=>{
    if(!lhArr||lhArr.length<2) return {arrow:'',delta:''};
    const first=lhArr[0].line, last=lhArr[lhArr.length-1].line;
    if(first===last) return {arrow:'',delta:''};
    const absDiff=Math.abs(+(last-first).toFixed(1)).toFixed(1);
    if(last>first) return {
      arrow:`<span style="font:900 11px var(--M);color:var(--rd);margin-left:2px;vertical-align:middle">↑</span>`,
      delta:`<span style="font:500 8px var(--M);color:var(--rd);margin-left:1px">(+${absDiff})</span>`
    };
